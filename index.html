ていない場合は、アプリ一覧から「RePaMo」で検索して表示します。", "images": ["img_okyakusama/okyakusama_008.jpg", "img_okyakusama/okyakusama_009.jpg", "img_okyakusama/okyakusama_010.jpg", "img_okyakusama/okyakusama_011.jpg", "img_okyakusama/okyakusama_012.jpg"]}, {"heading": "ログインする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "ログインする", "blocks": [{"text": "管理者がアカウントを作成すると、以下のとおりメールが送信されます。", "images": []}, {"text": "メール上のリンクを押して、アカウント認証を行います。", "images": ["img_okyakusama/okyakusama_013.jpg"]}, {"text": "アカウント認証は、パスワードを設定するのみになります。", "images": []}, {"text": "パスワードを設定して、ボタン [登録する] を押下します。", "images": ["img_okyakusama/okyakusama_014.jpg"]}, {"text": "アカウント認証が完了しますので、ボタン [ログインする] を押下します。", "images": ["img_okyakusama/okyakusama_015.jpg"]}, {"text": "ログイン画面が表示されますので、メールアドレスとパスワードを入力して、ボタン [ログインする] を押下し、ログインします。", "images": ["img_okyakusama/okyakusama_016.jpg"]}], "text": "管理者がアカウントを作成すると、以下のとおりメールが送信されます。\nメール上のリンクを押して、アカウント認証を行います。\nアカウント認証は、パスワードを設定するのみになります。\nパスワードを設定して、ボタン [登録する] を押下します。\nアカウント認証が完了しますので、ボタン [ログインする] を押下します。\nログイン画面が表示されますので、メールアドレスとパスワードを入力して、ボタン [ログインする] を押下し、ログインします。", "images": ["img_okyakusama/okyakusama_013.jpg", "img_okyakusama/okyakusama_014.jpg", "img_okyakusama/okyakusama_015.jpg", "img_okyakusama/okyakusama_016.jpg"]}, {"heading": "パスワードを忘れた場合", "blocks": [{"text": "「ログインでお困りの方」リンクからパスワードリセットを行います。", "images": []}, {"text": "メールアドレスに、自分のメールアドレスを入力して、ボタン [パスワードをリセットする] を押下します。", "images": ["img_okyakusama/okyakusama_017.jpg"]}, {"text": "以下の画面が表示されますので、メールを確認ください。", "images": ["img_okyakusama/okyakusama_018.jpg"]}, {"text": "メールを確認すると、URLが表示されていますので、そちらのURLを押下します。", "images": ["img_okyakusama/okyakusama_019.jpg"]}, {"text": "新たにパスワードを設定してボタン [登録する] を押下して、パスワードの更新が完了します。", "images": ["img_okyakusama/okyakusama_020.jpg"]}], "text": "「ログインでお困りの方」リンクからパスワードリセットを行います。\nメールアドレスに、自分のメールアドレスを入力して、ボタン [パスワードをリセットする] を押下します。\n以下の画面が表示されますので、メールを確認ください。\nメールを確認すると、URLが表示されていますので、そちらのURLを押下します。\n新たにパスワードを設定してボタン [登録する] を押下して、パスワードの更新が完了します。", "images": ["img_okyakusama/okyakusama_017.jpg", "img_okyakusama/okyakusama_018.jpg", "img_okyakusama/okyakusama_019.jpg", "img_okyakusama/okyakusama_020.jpg"]}, {"heading": "その他ログインや、ご利用前にシステムに関するお問い合わせをしたい場合", "blocks": [{"text": "以下のお問い合わせリンクから、お問い合わせください。", "images": ["img_okyakusama/okyakusama_021.jpg"]}, {"text": "各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。", "images": []}, {"text": "管理者からのご連絡をお待ちください。", "images": ["img_okyakusama/okyakusama_022.jpg"]}], "text": "以下のお問い合わせリンクから、お問い合わせください。\n各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。\n管理者からのご連絡をお待ちください。", "images": ["img_okyakusama/okyakusama_021.jpg", "img_okyakusama/okyakusama_022.jpg"]}, {"heading": "損傷箇所の見積りをする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "AIで自動見積りをする", "blocks": [{"text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_okyakusama/okyakusama_023.jpg"]}, {"text": "車両画面が表示されるので、画面中のボタン [新規見積] を押下します。", "images": ["img_okyakusama/okyakusama_024.jpg"]}, {"text": "■ １. 車両の写真を登録する", "images": []}, {"text": "新規見積画面が表示されますので、まずは、該当車両のコーションプレートの写真をアップロードします。", "images": ["img_okyakusama/okyakusama_025.jpg"]}], "text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面が表示されるので、画面中のボタン [新規見積] を押下します。\n■ １. 車両の写真を登録する\n新規見積画面が表示されますので、まずは、該当車両のコーションプレートの写真をアップロードします。", "images": ["img_okyakusama/okyakusama_023.jpg", "img_okyakusama/okyakusama_024.jpg", "img_okyakusama/okyakusama_025.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "コーションプレートの写真をアップロードした後、ボタン [次の写真へ] を押下します。", "images": ["img_okyakusama/okyakusama_026.jpg"]}, {"text": "次に、車両の全体写真をアップロードします。", "images": ["img_okyakusama/okyakusama_027.jpg"]}], "text": "コーションプレートの写真をアップロードした後、ボタン [次の写真へ] を押下します。\n次に、車両の全体写真をアップロードします。", "images": ["img_okyakusama/okyakusama_026.jpg", "img_okyakusama/okyakusama_027.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "次に損傷箇所の画像を登録します。", "images": []}, {"text": "まず、ボタン [損傷箇所を追加] を押下します。", "images": ["img_okyakusama/okyakusama_028.jpg"]}, {"text": "車の見開き図が表示されますので、損傷箇所の場所をクリック（タップ）し、ボタン [次へ] を押下します", "images": ["img_okyakusama/okyakusama_029.jpg", "img_okyakusama/okyakusama_030.jpg"]}, {"text": "次に、損傷箇所の引きの写真をアップロードします。案内が表示されますので、確認した上で、ボタン [写真を選択する] を押下して、写真をアップロードします。", "images": ["img_okyakusama/okyakusama_031.jpg"]}], "text": "次に損傷箇所の画像を登録します。\nまず、ボタン [損傷箇所を追加] を押下します。\n車の見開き図が表示されますので、損傷箇所の場所をクリック（タップ）し、ボタン [次へ] を押下します\n次に、損傷箇所の引きの写真をアップロードします。案内が表示されますので、確認した上で、ボタン [写真を選択する] を押下して、写真をアップロードします。", "images": ["img_okyakusama/okyakusama_028.jpg", "img_okyakusama/okyakusama_029.jpg", "img_okyakusama/okyakusama_030.jpg", "img_okyakusama/okyakusama_031.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "写真選択後、損傷箇所をマウスで囲って選択し、ボタン [登録] を押下します。", "images": ["img_okyakusama/okyakusama_032.jpg", "img_okyakusama/okyakusama_033.jpg"]}, {"text": "次に、損傷箇所のアップの写真をアップロードします。", "images": ["img_okyakusama/okyakusama_034.jpg"]}], "text": "写真選択後、損傷箇所をマウスで囲って選択し、ボタン [登録] を押下します。\n次に、損傷箇所のアップの写真をアップロードします。", "images": ["img_okyakusama/okyakusama_032.jpg", "img_okyakusama/okyakusama_033.jpg", "img_okyakusama/okyakusama_034.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "写真選択後、損傷箇所を囲って選択し、ボタン [登録] を押下します", "images": ["img_okyakusama/okyakusama_035.jpg", "img_okyakusama/okyakusama_036.jpg"]}, {"text": "損傷箇所の登録が完了したらボタン [次へ] を押下します。傷が複数箇所存在する場合は、ボタン [損傷箇所を追加] から再度、損傷箇所の登録を行います。", "images": ["img_okyakusama/okyakusama_037.jpg"]}, {"text": "■ ２. 車両情報を登録する", "images": []}, {"text": "次に車両情報を登録します。", "images": []}, {"text": "まず、国産・輸入車を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_038.jpg"]}, {"text": "次に、車両タイプを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_039.jpg"]}, {"text": "次に、車種名を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_040.jpg"]}, {"text": "次に、車体番号を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_041.jpg"]}, {"text": "次に、カラーコードとカラー種別を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_042.jpg"]}, {"text": "■ ３. 損傷箇所の詳細情報を登録する", "images": []}, {"text": "次に、損傷箇所の詳細な情報を登録します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。", "images": ["img_okyakusama/okyakusama_043.jpg"]}, {"text": "詳細では、部位情報、割れの有無、凹みの有無、傷の縦と横の長さ、施工レベルを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_okyakusama/okyakusama_044.jpg"]}], "text": "写真選択後、損傷箇所を囲って選択し、ボタン [登録] を押下します\n損傷箇所の登録が完了したらボタン [次へ] を押下します。傷が複数箇所存在する場合は、ボタン [損傷箇所を追加] から再度、損傷箇所の登録を行います。\n■ ２. 車両情報を登録する\n次に車両情報を登録します。\nまず、国産・輸入車を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車両タイプを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車種名を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車体番号を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、カラーコードとカラー種別を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n■ ３. 損傷箇所の詳細情報を登録する\n次に、損傷箇所の詳細な情報を登録します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。\n詳細では、部位情報、割れの有無、凹みの有無、傷の縦と横の長さ、施工レベルを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_okyakusama/okyakusama_035.jpg", "img_okyakusama/okyakusama_036.jpg", "img_okyakusama/okyakusama_037.jpg", "img_okyakusama/okyakusama_038.jpg", "img_okyakusama/okyakusama_039.jpg", "img_okyakusama/okyakusama_040.jpg", "img_okyakusama/okyakusama_041.jpg", "img_okyakusama/okyakusama_042.jpg", "img_okyakusama/okyakusama_043.jpg", "img_okyakusama/okyakusama_044.jpg"]}, {"heading": "施工レベル", "blocks": [{"text": "■ ４. 訪問先住所を登録する", "images": []}, {"text": "デフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_okyakusama/okyakusama_045.jpg"]}, {"text": "■ ５. 納品希望日を指定する", "images": []}, {"text": "いつまでに納品を希望されるか、カレンダー上から日付を選択します。", "images": ["img_okyakusama/okyakusama_046.jpg"]}, {"text": "日付を選択した後、ポップアップが表示されますので、何時までに納品が必要かを指定された上で、ボタン [納品期日を設定する] を押下します。", "images": ["img_okyakusama/okyakusama_047.jpg"]}, {"text": "■ ６. 施工可能日を指定する", "images": []}, {"text": "納品期日までに、いつ施工に来訪可能か、指定します。", "images": []}, {"text": "問題なければ、ボタン [車両を登録する] を押下して、車両登録を完了します。", "images": ["img_okyakusama/okyakusama_048.jpg"]}, {"text": "車両の登録を終える場合は、ボタン [車両登録を完了する] を押下します。", "images": []}, {"text": "２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。", "images": ["img_okyakusama/okyakusama_049.jpg"]}, {"text": "車両画面に、登録した車両が追加され、見積情報の登録が完了したことを知らせるメッセージが届きます。", "images": ["img_okyakusama/okyakusama_050.jpg"]}, {"text": "見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": []}], "text": "■ ４. 訪問先住所を登録する\nデフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。\n■ ５. 納品希望日を指定する\nいつまでに納品を希望されるか、カレンダー上から日付を選択します。\n日付を選択した後、ポップアップが表示されますので、何時までに納品が必要かを指定された上で、ボタン [納品期日を設定する] を押下します。\n■ ６. 施工可能日を指定する\n納品期日までに、いつ施工に来訪可能か、指定します。\n問題なければ、ボタン [車両を登録する] を押下して、車両登録を完了します。\n車両の登録を終える場合は、ボタン [車両登録を完了する] を押下します。\n２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。\n車両画面に、登録した車両が追加され、見積情報の登録が完了したことを知らせるメッセージが届きます。\n見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": ["img_okyakusama/okyakusama_045.jpg", "img_okyakusama/okyakusama_046.jpg", "img_okyakusama/okyakusama_047.jpg", "img_okyakusama/okyakusama_048.jpg", "img_okyakusama/okyakusama_049.jpg", "img_okyakusama/okyakusama_050.jpg"]}, {"heading": "見積りをメッセージで依頼する", "blocks": [{"text": "見積りを別途メッセージでご依頼頂く場合は、 [ 損傷箇所以外で、メッセージを送りたい] をご参照ください。", "images": []}], "text": "見積りを別途メッセージでご依頼頂く場合は、 [ 損傷箇所以外で、メッセージを送りたい] をご参照ください。", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "ご依頼いただきました修理は、以下の 8 ステップで進行されます。", "images": []}, {"text": "Step 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\nマッチング ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品承認 ： Step 8\n御請求", "images": []}, {"text": "Step1\n見積り ： ご依頼いただいた損傷箇所のお見積りをします", "images": []}, {"text": "Step2\n見積確定 ： 担当者が見積りを精査して見積り金額の確定をし、お見積書をご提示します", "images": []}, {"text": "Step3\n仮発注 ： お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\n\n→詳細は、[１．お見積りを確認して仮発注する] をご確認ください", "images": []}, {"text": "Step4\nマッチング ： ご担当施工店のマッチングを行います", "images": []}, {"text": "Step5\n正式発注 ： システムから正式発注いただき、発注書が自動発行されます\n\n→詳細は、[２．正式発注する] をご確認ください", "images": []}, {"text": "Step6\n施工 ： 施工を行います", "images": []}, {"text": "Step7\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください", "images": []}, {"text": "Step8\n御請求 ： 納品完了後、15日または末締めで、まとめて御請求となります。", "images": []}], "text": "ご依頼いただきました修理は、以下の 8 ステップで進行されます。\nStep 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\nマッチング ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品承認 ： Step 8\n御請求\nStep1\n見積り ： ご依頼いただいた損傷箇所のお見積りをします\nStep2\n見積確定 ： 担当者が見積りを精査して見積り金額の確定をし、お見積書をご提示します\nStep3\n仮発注 ： お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\n\n→詳細は、[１．お見積りを確認して仮発注する] をご確認ください\nStep4\nマッチング ： ご担当施工店のマッチングを行います\nStep5\n正式発注 ： システムから正式発注いただき、発注書が自動発行されます\n\n→詳細は、[２．正式発注する] をご確認ください\nStep6\n施工 ： 施工を行います\nStep7\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください\nStep8\n御請求 ： 納品完了後、15日または末締めで、まとめて御請求となります。", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_okyakusama/okyakusama_051.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_okyakusama/okyakusama_052.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_okyakusama/okyakusama_053.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP3. お見積りを確認して仮発注する", "images": []}, {"text": "見積りが確定したタイミングで、見積書が発行された旨のメッセージが自動送信されます。", "images": []}, {"text": "ボタン [見積書を確認する] から、お見積り書を表示してご確認いただけます。", "images": ["img_okyakusama/okyakusama_054.jpg"]}, {"text": "■ STEP5. 正式発注する", "images": []}, {"text": "施工店と、施工店の作業日が確定しましたら、ボタン [正式発注する] がメッセージで表示されますので、押下していただくと、正式発注が完了します。", "images": ["img_okyakusama/okyakusama_055.jpg"]}, {"text": "正式発注を行う前に、キャンセルポリシーに関わる同意メッセージが表示されます。", "images": []}, {"text": "ポリシーに同意いただき、[正式発注する] を押下いただくことで、正式発注が完了します。", "images": ["img_okyakusama/okyakusama_056.jpg"]}, {"text": "正式発注いただくと、発注が完了します。", "images": ["img_okyakusama/okyakusama_057.jpg"]}, {"text": "■ STEP7. 施工内容を確認して、納品承諾する", "images": []}, {"text": "施工店が施工完了すると、施工完了のメッセージが送信されてきます。", "images": ["img_okyakusama/okyakusama_058.jpg"]}, {"text": "[報告内容を確認] ボタンを押下いただきますと、施工完了報告を確認することができます。", "images": []}, {"text": "加修箇所をクリックいただくと、施工内容について確認することができます。", "images": ["img_okyakusama/okyakusama_059.jpg"]}, {"text": "施工完了後の写真を、損傷箇所ごとに確認することができます。", "images": ["img_okyakusama/okyakusama_060.jpg"]}, {"text": "報告内容に問題がない場合は、[納品承諾を行う] をクリックいただくと、納品承諾が完了になります。", "images": ["img_okyakusama/okyakusama_061.jpg"]}, {"text": "納品が完了すると、納品書がダウンロードできるようになります。", "images": ["img_okyakusama/okyakusama_062.jpg", "img_okyakusama/okyakusama_063.jpg"]}], "text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP3. お見積りを確認して仮発注する\n見積りが確定したタイミングで、見積書が発行された旨のメッセージが自動送信されます。\nボタン [見積書を確認する] から、お見積り書を表示してご確認いただけます。\n■ STEP5. 正式発注する\n施工店と、施工店の作業日が確定しましたら、ボタン [正式発注する] がメッセージで表示されますので、押下していただくと、正式発注が完了します。\n正式発注を行う前に、キャンセルポリシーに関わる同意メッセージが表示されます。\nポリシーに同意いただき、[正式発注する] を押下いただくことで、正式発注が完了します。\n正式発注いただくと、発注が完了します。\n■ STEP7. 施工内容を確認して、納品承諾する\n施工店が施工完了すると、施工完了のメッセージが送信されてきます。\n[報告内容を確認] ボタンを押下いただきますと、施工完了報告を確認することができます。\n加修箇所をクリックいただくと、施工内容について確認することができます。\n施工完了後の写真を、損傷箇所ごとに確認することができます。\n報告内容に問題がない場合は、[納品承諾を行う] をクリックいただくと、納品承諾が完了になります。\n納品が完了すると、納品書がダウンロードできるようになります。", "images": ["img_okyakusama/okyakusama_051.jpg", "img_okyakusama/okyakusama_052.jpg", "img_okyakusama/okyakusama_053.jpg", "img_okyakusama/okyakusama_054.jpg", "img_okyakusama/okyakusama_055.jpg", "img_okyakusama/okyakusama_056.jpg", "img_okyakusama/okyakusama_057.jpg", "img_okyakusama/okyakusama_058.jpg", "img_okyakusama/okyakusama_059.jpg", "img_okyakusama/okyakusama_060.jpg", "img_okyakusama/okyakusama_061.jpg", "img_okyakusama/okyakusama_062.jpg", "img_okyakusama/okyakusama_063.jpg"]}, {"heading": "依頼された内容を確認する", "blocks": [{"text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_okyakusama/okyakusama_064.jpg"]}, {"text": "車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、", "images": []}, {"text": "その画面上で、依頼内容をご確認いただくことができます。", "images": ["img_okyakusama/okyakusama_065.jpg"]}], "text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、\nその画面上で、依頼内容をご確認いただくことができます。", "images": ["img_okyakusama/okyakusama_064.jpg", "img_okyakusama/okyakusama_065.jpg"]}, {"heading": "依頼された車両に関する問い合わせをする", "blocks": [{"text": "依頼した車両に関するお問い合わせをされる場合は、画面上部メニュー [車両] を選択します。", "images": ["img_okyakusama/okyakusama_066.jpg"]}, {"text": "車両画面の左から対象の車を選択すると、右画面に [メッセージ] タブが表示されますので、そちらの画面から、該当の車両の修理に関するお問い合わせ内容を送信いただけます。", "images": ["img_okyakusama/okyakusama_067.jpg"]}, {"text": "メッセージ欄にメッセージを入力後、右の青いボタンを押下するとメッセージが送信されます。", "images": ["img_okyakusama/okyakusama_068.jpg"]}, {"text": "写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_okyakusama/okyakusama_069.jpg"]}], "text": "依頼した車両に関するお問い合わせをされる場合は、画面上部メニュー [車両] を選択します。\n車両画面の左から対象の車を選択すると、右画面に [メッセージ] タブが表示されますので、そちらの画面から、該当の車両の修理に関するお問い合わせ内容を送信いただけます。\nメッセージ欄にメッセージを入力後、右の青いボタンを押下するとメッセージが送信されます。\n写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_okyakusama/okyakusama_066.jpg", "img_okyakusama/okyakusama_067.jpg", "img_okyakusama/okyakusama_068.jpg", "img_okyakusama/okyakusama_069.jpg"]}, {"heading": "加修依頼をキャンセルする", "blocks": [{"text": "加修依頼をキャンセルされる場合は、画面上部メニュー [車両] を押下して、車両画面を表示し、", "images": ["img_okyakusama/okyakusama_070.jpg"]}, {"text": "画面上部のボタン [案件キャンセル] を押下します。", "images": ["img_okyakusama/okyakusama_071.jpg"]}, {"text": "案件キャンセル画面が表示されますので、対象の車両を選択します。", "images": ["img_okyakusama/okyakusama_072.jpg"]}, {"text": "選択すると、対象車両に関する情報が表示されますので、[キャンセル申請を送る] ボタンを押下します", "images": ["img_okyakusama/okyakusama_073.jpg"]}, {"text": "案件キャンセル理由を入力する画面が表示されますので、キャンセル理由を入力してください。", "images": []}, {"text": "また、キャンセルポリシーをご確認の上、[キャンセルポリシーに同意する] を押下すると [キャンセル申請を送る] が押下できるようになりますので、押下して、申請完了になります。", "images": ["img_okyakusama/okyakusama_074.jpg", "img_okyakusama/okyakusama_075.jpg"]}, {"text": "メッセージ上に申請した旨が記載され、", "images": ["img_okyakusama/okyakusama_076.jpg"]}, {"text": "お客様申請後、担当者が申請許諾することで、案件キャンセルが成立します。", "images": ["img_okyakusama/okyakusama_077.jpg"]}], "text": "加修依頼をキャンセルされる場合は、画面上部メニュー [車両] を押下して、車両画面を表示し、\n画面上部のボタン [案件キャンセル] を押下します。\n案件キャンセル画面が表示されますので、対象の車両を選択します。\n選択すると、対象車両に関する情報が表示されますので、[キャンセル申請を送る] ボタンを押下します\n案件キャンセル理由を入力する画面が表示されますので、キャンセル理由を入力してください。\nまた、キャンセルポリシーをご確認の上、[キャンセルポリシーに同意する] を押下すると [キャンセル申請を送る] が押下できるようになりますので、押下して、申請完了になります。\nメッセージ上に申請した旨が記載され、\nお客様申請後、担当者が申請許諾することで、案件キャンセルが成立します。", "images": ["img_okyakusama/okyakusama_070.jpg", "img_okyakusama/okyakusama_071.jpg", "img_okyakusama/okyakusama_072.jpg", "img_okyakusama/okyakusama_073.jpg", "img_okyakusama/okyakusama_074.jpg", "img_okyakusama/okyakusama_075.jpg", "img_okyakusama/okyakusama_076.jpg", "img_okyakusama/okyakusama_077.jpg"]}, {"heading": "損傷箇所以外で、メッセージを送りたい", "blocks": [{"text": "見積り後の車両に関するやり取りは、車両一覧から行いますが、それ以外でのメッセージのやりとりは、画面上部の [メッセージ] メニューからメッセージを送信いただけます。", "images": ["img_okyakusama/okyakusama_078.jpg"]}, {"text": "画面を表示すると、左側に管理者や担当施工店名が表示されていますので、左から担当者を選択します。", "images": ["img_okyakusama/okyakusama_079.jpg"]}, {"text": "担当者を選択すると、チャット画面が表示されるので、テキストを入力します。", "images": ["img_okyakusama/okyakusama_080.jpg"]}, {"text": "右の青いボタンを押下するとメッセージが送信されます。", "images": ["img_okyakusama/okyakusama_081.jpg"]}, {"text": "写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_okyakusama/okyakusama_082.jpg"]}], "text": "見積り後の車両に関するやり取りは、車両一覧から行いますが、それ以外でのメッセージのやりとりは、画面上部の [メッセージ] メニューからメッセージを送信いただけます。\n画面を表示すると、左側に管理者や担当施工店名が表示されていますので、左から担当者を選択します。\n担当者を選択すると、チャット画面が表示されるので、テキストを入力します。\n右の青いボタンを押下するとメッセージが送信されます。\n写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_okyakusama/okyakusama_078.jpg", "img_okyakusama/okyakusama_079.jpg", "img_okyakusama/okyakusama_080.jpg", "img_okyakusama/okyakusama_081.jpg", "img_okyakusama/okyakusama_082.jpg"]}, {"heading": "スケジュール登録・閲覧をする", "blocks": [{"text": "スケジュールメニューから、スケジュールを登録することができます。", "images": []}, {"text": "スケジュールを登録・閲覧するには、上部メニュー [スケジュール] を押下します。", "images": ["img_okyakusama/okyakusama_083.jpg"]}, {"text": "カレンダーが以下のとおり表示されます。", "images": []}, {"text": "予定を登録される場合は、該当の日付を押下します。", "images": ["img_okyakusama/okyakusama_084.jpg"]}, {"text": "該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。", "images": ["img_okyakusama/okyakusama_085.jpg"]}, {"text": "予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。", "images": ["img_okyakusama/okyakusama_086.jpg"]}, {"text": "予定の登録が完了し、スケジュールに新規予定が表示されます。", "images": ["img_okyakusama/okyakusama_087.jpg"]}, {"text": "終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。", "images": ["img_okyakusama/okyakusama_088.jpg"]}, {"text": "終日の予定は、日付がグレー表示されます。", "images": ["img_okyakusama/okyakusama_089.jpg"]}], "text": "スケジュールメニューから、スケジュールを登録することができます。\nスケジュールを登録・閲覧するには、上部メニュー [スケジュール] を押下します。\nカレンダーが以下のとおり表示されます。\n予定を登録される場合は、該当の日付を押下します。\n該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。\n予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。\n予定の登録が完了し、スケジュールに新規予定が表示されます。\n終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。\n終日の予定は、日付がグレー表示されます。", "images": ["img_okyakusama/okyakusama_083.jpg", "img_okyakusama/okyakusama_084.jpg", "img_okyakusama/okyakusama_085.jpg", "img_okyakusama/okyakusama_086.jpg", "img_okyakusama/okyakusama_087.jpg", "img_okyakusama/okyakusama_088.jpg", "img_okyakusama/okyakusama_089.jpg"]}, {"heading": "ユーザーを追加する", "blocks": [{"text": "お客様内で管理者登録いただいているユーザーで、ユーザーの追加登録を行うことができます。", "images": []}, {"text": "追加を行うには、上部メニュー [マイページ] を押下します。", "images": ["img_okyakusama/okyakusama_090.jpg"]}, {"text": "TODO：画面", "images": []}, {"text": "所属ユーザー追加ポップアップが表示されるので、情報を入力いただき、ボタン [所属ユーザーを追加する] を押下します。", "images": ["img_okyakusama/okyakusama_091.jpg"]}, {"text": "以下のとおり完了のポップアップが表示され、追加したメールアドレスに対して、認証メールが送信されます。", "images": ["img_okyakusama/okyakusama_092.jpg"]}, {"text": "送信された認証メールを受け取った方は、[ログインする] を参照いただき、初回ログインを行います。", "images": []}], "text": "お客様内で管理者登録いただいているユーザーで、ユーザーの追加登録を行うことができます。\n追加を行うには、上部メニュー [マイページ] を押下します。\nTODO：画面\n所属ユーザー追加ポップアップが表示されるので、情報を入力いただき、ボタン [所属ユーザーを追加する] を押下します。\n以下のとおり完了のポップアップが表示され、追加したメールアドレスに対して、認証メールが送信されます。\n送信された認証メールを受け取った方は、[ログインする] を参照いただき、初回ログインを行います。", "images": ["img_okyakusama/okyakusama_090.jpg", "img_okyakusama/okyakusama_091.jpg", "img_okyakusama/okyakusama_092.jpg"]}, {"heading": "改定履歴", "blocks": [{"text": "Ver 1.0 ： 2026/4/29 ： 初回リリース", "images": []}], "text": "Ver 1.0 ： 2026/4/29 ： 初回リリース", "images": []}]}, "施工店": {"role": "施工店", "title": "リペモ 施工店向けマニュアル", "sections": [{"heading": "はじめに", "blocks": [{"text": "", "images": ["img_sekoten/sekoten_001.jpg"]}, {"text": "■ 施工店マニュアル", "images": []}, {"text": "Ver 1.0.0", "images": []}, {"text": "目次", "images": []}], "text": "■ 施工店マニュアル\nVer 1.0.0\n目次", "images": ["img_sekoten/sekoten_001.jpg"]}, {"heading": "動作環境及び注意事項", "blocks": [{"text": "本サイトの推奨動作環境は以下になります。", "images": []}, {"text": "モバイル ： モバイルは、Webブラウザで動作しますが、モバイルに最適化を行っており、アプリのようにご利用いただくことが可能です。", "images": []}], "text": "本サイトの推奨動作環境は以下になります。\nモバイル ： モバイルは、Webブラウザで動作しますが、モバイルに最適化を行っており、アプリのようにご利用いただくことが可能です。", "images": []}, {"heading": "アプリをインストールする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "iOSをご利用の場合", "blocks": [{"text": "https://relationpairmobility.com/ にアクセスします。", "images": []}, {"text": "ブラウザを表示して、画面下部にある三点リーダーをタップします。", "images": ["img_sekoten/sekoten_002.jpg"]}, {"text": "ポップアップが表示されるので、[共有] をタップし、", "images": ["img_sekoten/sekoten_003.jpg"]}, {"text": "その後、表示されるポップアップから「もっと見る」をタップします。", "images": ["img_sekoten/sekoten_004.jpg"]}, {"text": "[ホーム画面に追加] をタップします。", "images": ["img_sekoten/sekoten_005.jpg"]}, {"text": "以下の画面が表示されたら「追加」ボタンをタップします。", "images": ["img_sekoten/sekoten_006.jpg"]}, {"text": "端末上にアプリが表示されます。", "images": ["img_sekoten/sekoten_007.jpg"]}], "text": "https://relationpairmobility.com/ にアクセスします。\nブラウザを表示して、画面下部にある三点リーダーをタップします。\nポップアップが表示されるので、[共有] をタップし、\nその後、表示されるポップアップから「もっと見る」をタップします。\n[ホーム画面に追加] をタップします。\n以下の画面が表示されたら「追加」ボタンをタップします。\n端末上にアプリが表示されます。", "images": ["img_sekoten/sekoten_002.jpg", "img_sekoten/sekoten_003.jpg", "img_sekoten/sekoten_004.jpg", "img_sekoten/sekoten_005.jpg", "img_sekoten/sekoten_006.jpg", "img_sekoten/sekoten_007.jpg"]}, {"heading": "Androidをご利用の場合", "blocks": [{"text": "https://relationpairmobility.com/ にアクセスします。", "images": []}, {"text": "ブラウザを起動して、三点リーダーをクリックしたあと、[ホーム画面に追加] を押下して、アプリをインストールします。", "images": ["img_sekoten/sekoten_008.jpg", "img_sekoten/sekoten_009.jpg", "img_sekoten/sekoten_010.jpg"]}, {"text": "インストールが完了すると、インストール完了の通知が表示されます。", "images": ["img_sekoten/sekoten_011.jpg"]}, {"text": "端末上にアプリが表示されるか 、表示されていない場合は、アプリ一覧から「RePaMo」で検索して表示します。", "images": ["img_sekoten/sekoten_012.jpg"]}], "text": "https://relationpairmobility.com/ にアクセスします。\nブラウザを起動して、三点リーダーをクリックしたあと、[ホーム画面に追加] を押下して、アプリをインストールします。\nインストールが完了すると、インストール完了の通知が表示されます。\n端末上にアプリが表示されるか 、表示されていない場合は、アプリ一覧から「RePaMo」で検索して表示します。", "images": ["img_sekoten/sekoten_008.jpg", "img_sekoten/sekoten_009.jpg", "img_sekoten/sekoten_010.jpg", "img_sekoten/sekoten_011.jpg", "img_sekoten/sekoten_012.jpg"]}, {"heading": "ログインする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "ログインする", "blocks": [{"text": "管理者がアカウントを作成すると、以下のとおりメールが送信されます。", "images": []}, {"text": "メール上のリンクを押して、アカウント認証を行います。", "images": ["img_sekoten/sekoten_013.jpg"]}, {"text": "以下の画面を表示して、適切なパスワードを設定して、ボタン [登録する] を押下すると、アカウント認証が完了します。", "images": ["img_sekoten/sekoten_014.jpg", "img_sekoten/sekoten_015.jpg"]}, {"text": "アカウント認証が完了しますので、ボタン [ログインする] を押下します。", "images": []}], "text": "管理者がアカウントを作成すると、以下のとおりメールが送信されます。\nメール上のリンクを押して、アカウント認証を行います。\n以下の画面を表示して、適切なパスワードを設定して、ボタン [登録する] を押下すると、アカウント認証が完了します。\nアカウント認証が完了しますので、ボタン [ログインする] を押下します。", "images": ["img_sekoten/sekoten_013.jpg", "img_sekoten/sekoten_014.jpg", "img_sekoten/sekoten_015.jpg"]}, {"heading": "パスワードを忘れた場合", "blocks": [{"text": "「ログインでお困りの方」リンクからパスワードリセットを行います。", "images": []}, {"text": "メールアドレスに、自分のメールアドレスを入力して、ボタン [パスワードをリセットする] を押下すると、自分のメールアドレスに通知が送信されますので、メールを確認します。", "images": ["img_sekoten/sekoten_016.jpg", "img_sekoten/sekoten_017.jpg", "img_sekoten/sekoten_018.jpg"]}, {"text": "メールの中に、認証URLが記載されているので、そちらをタップします。", "images": ["img_sekoten/sekoten_019.jpg"]}, {"text": "パスワード再設定画面で、パスワードを再設定して完了です。", "images": []}, {"text": "新たに設定したパスワードでログインしてください。", "images": ["img_sekoten/sekoten_020.jpg", "img_sekoten/sekoten_021.jpg"]}], "text": "「ログインでお困りの方」リンクからパスワードリセットを行います。\nメールアドレスに、自分のメールアドレスを入力して、ボタン [パスワードをリセットする] を押下すると、自分のメールアドレスに通知が送信されますので、メールを確認します。\nメールの中に、認証URLが記載されているので、そちらをタップします。\nパスワード再設定画面で、パスワードを再設定して完了です。\n新たに設定したパスワードでログインしてください。", "images": ["img_sekoten/sekoten_016.jpg", "img_sekoten/sekoten_017.jpg", "img_sekoten/sekoten_018.jpg", "img_sekoten/sekoten_019.jpg", "img_sekoten/sekoten_020.jpg", "img_sekoten/sekoten_021.jpg"]}, {"heading": "その他ログインや、ご利用前にシステムに関するお問い合わせをしたい場合", "blocks": [{"text": "以下のお問い合わせリンクから、お問い合わせください。", "images": ["img_sekoten/sekoten_022.jpg", "img_sekoten/sekoten_023.jpg"]}, {"text": "各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。", "images": []}, {"text": "管理者からのご連絡をお待ちください。", "images": []}], "text": "以下のお問い合わせリンクから、お問い合わせください。\n各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。\n管理者からのご連絡をお待ちください。", "images": ["img_sekoten/sekoten_022.jpg", "img_sekoten/sekoten_023.jpg"]}, {"heading": "LINE通知を設定する", "blocks": [{"text": "LINE通知を設定するには、マイページからLINE通知設定を行います。", "images": ["img_sekoten/sekoten_024.jpg"]}, {"text": "LINE連携を押下すると、以下の画面に遷移して、LINEログインが起動されます。", "images": []}, {"text": "LINEログインが完了すると、マイページ上で、LINEログインが設定済みになります。", "images": ["img_sekoten/sekoten_025.jpg", "img_sekoten/sekoten_026.jpg"]}, {"text": "メッセージの受信や、対応が必要な依頼があると、LINE上でメッセージが通知されます。", "images": ["img_sekoten/sekoten_027.jpg"]}], "text": "LINE通知を設定するには、マイページからLINE通知設定を行います。\nLINE連携を押下すると、以下の画面に遷移して、LINEログインが起動されます。\nLINEログインが完了すると、マイページ上で、LINEログインが設定済みになります。\nメッセージの受信や、対応が必要な依頼があると、LINE上でメッセージが通知されます。", "images": ["img_sekoten/sekoten_024.jpg", "img_sekoten/sekoten_025.jpg", "img_sekoten/sekoten_026.jpg", "img_sekoten/sekoten_027.jpg"]}, {"heading": "損傷箇所の見積りをする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "AIで自動見積りをする", "blocks": [{"text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_sekoten/sekoten_028.jpg"]}, {"text": "車両画面が表示されるので、画面中のボタン [新規見積] を押下します。", "images": ["img_sekoten/sekoten_029.jpg"]}, {"text": "■ １. 車両の写真を登録する", "images": []}, {"text": "新規見積画面が表示されますので、まずは、納品先のお客様を選択します。", "images": ["img_sekoten/sekoten_030.jpg", "img_sekoten/sekoten_031.jpg"]}, {"text": "車両登録画面が表示されますので、[写真撮影] -> [コーションプレート] から選択します。", "images": ["img_sekoten/sekoten_032.jpg", "img_sekoten/sekoten_033.jpg"]}, {"text": "■ 撮影：コーションプレートの写真", "images": []}, {"text": "まずは、該当車両のコーションプレートの写真を撮影します。", "images": []}, {"text": "カメラを起動するとアクセス許可を求められますので、[許可] を選択します（※初回のみ）", "images": ["img_sekoten/sekoten_034.jpg"]}, {"text": "撮影ガイドが表示されますので、[撮影に進む] を押下し、撮影します。", "images": []}, {"text": "横向きで撮影する場合は、横撮影ボタンを押下して撮影します。", "images": ["img_sekoten/sekoten_035.jpg", "img_sekoten/sekoten_036.jpg"]}], "text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面が表示されるので、画面中のボタン [新規見積] を押下します。\n■ １. 車両の写真を登録する\n新規見積画面が表示されますので、まずは、納品先のお客様を選択します。\n車両登録画面が表示されますので、[写真撮影] -> [コーションプレート] から選択します。\n■ 撮影：コーションプレートの写真\nまずは、該当車両のコーションプレートの写真を撮影します。\nカメラを起動するとアクセス許可を求められますので、[許可] を選択します（※初回のみ）\n撮影ガイドが表示されますので、[撮影に進む] を押下し、撮影します。\n横向きで撮影する場合は、横撮影ボタンを押下して撮影します。", "images": ["img_sekoten/sekoten_028.jpg", "img_sekoten/sekoten_029.jpg", "img_sekoten/sekoten_030.jpg", "img_sekoten/sekoten_031.jpg", "img_sekoten/sekoten_032.jpg", "img_sekoten/sekoten_033.jpg", "img_sekoten/sekoten_034.jpg", "img_sekoten/sekoten_035.jpg", "img_sekoten/sekoten_036.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "■ 撮影：車両の全体写真", "images": []}, {"text": "次に、案内が表示されますので、確認した上で、損傷箇所の引きの写真を撮影します。", "images": ["img_sekoten/sekoten_037.jpg", "img_sekoten/sekoten_038.jpg"]}], "text": "■ 撮影：車両の全体写真\n次に、案内が表示されますので、確認した上で、損傷箇所の引きの写真を撮影します。", "images": ["img_sekoten/sekoten_037.jpg", "img_sekoten/sekoten_038.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "■ 選択：損傷箇所の場所を指定", "images": []}, {"text": "次に、車の見開き図が表示されますので、損傷箇所の場所をタップし、ボタン [次へ] を押下します", "images": ["img_sekoten/sekoten_039.jpg", "img_sekoten/sekoten_040.jpg"]}, {"text": "■ 撮影：損傷箇所の引きの写真", "images": []}, {"text": "案内が表示されますので、確認した上で、損傷箇所の引きの写真を撮影します。", "images": ["img_sekoten/sekoten_041.jpg", "img_sekoten/sekoten_042.jpg"]}], "text": "■ 選択：損傷箇所の場所を指定\n次に、車の見開き図が表示されますので、損傷箇所の場所をタップし、ボタン [次へ] を押下します\n■ 撮影：損傷箇所の引きの写真\n案内が表示されますので、確認した上で、損傷箇所の引きの写真を撮影します。", "images": ["img_sekoten/sekoten_039.jpg", "img_sekoten/sekoten_040.jpg", "img_sekoten/sekoten_041.jpg", "img_sekoten/sekoten_042.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "撮影した損傷箇所について、該当の傷の場所を指で囲み、ボタン [登録] をタップします。", "images": ["img_sekoten/sekoten_043.jpg", "img_sekoten/sekoten_044.jpg"]}, {"text": "■ 撮影：損傷箇所のアップの写真", "images": []}, {"text": "案内が表示されますので、確認した上で、損傷箇所のアップの写真を撮影します。", "images": ["img_sekoten/sekoten_045.jpg", "img_sekoten/sekoten_046.jpg"]}], "text": "撮影した損傷箇所について、該当の傷の場所を指で囲み、ボタン [登録] をタップします。\n■ 撮影：損傷箇所のアップの写真\n案内が表示されますので、確認した上で、損傷箇所のアップの写真を撮影します。", "images": ["img_sekoten/sekoten_043.jpg", "img_sekoten/sekoten_044.jpg", "img_sekoten/sekoten_045.jpg", "img_sekoten/sekoten_046.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "撮影した損傷箇所について、該当の傷の場所を指で囲み、ボタン [登録] をタップします。", "images": ["img_sekoten/sekoten_047.jpg", "img_sekoten/sekoten_048.jpg"]}, {"text": "損傷箇所の登録が完了したら、ボタン [完了して次へ進む] をタップします。", "images": []}, {"text": "傷が複数存在する場合は [+他の損傷箇所を撮影] をタップして、損傷箇所を追加撮影します。", "images": ["img_sekoten/sekoten_049.jpg"]}, {"text": "登録内容を確認して、ボタン [次へ] をタップします。", "images": ["img_sekoten/sekoten_050.jpg"]}, {"text": "■ ２. 車両情報を登録する", "images": []}, {"text": "次に車両情報を登録します。", "images": []}, {"text": "まず、国産・輸入車を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_051.jpg"]}, {"text": "次に、車両タイプを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_052.jpg"]}, {"text": "次に、車種名を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_053.jpg"]}, {"text": "次に、車体番号を選択します。写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_054.jpg"]}, {"text": "次に、カラーコードとカラー種別を選択します。写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_055.jpg"]}, {"text": "■ ３. 損傷箇所の詳細情報を登録する", "images": []}, {"text": "次に、損傷箇所の詳細な情報を登録します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。", "images": ["img_sekoten/sekoten_056.jpg", "img_sekoten/sekoten_057.jpg"]}, {"text": "詳細では、部位情報、割れの有無、凹みの有無、傷の縦と横の長さ、施工レベルを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_sekoten/sekoten_058.jpg"]}], "text": "撮影した損傷箇所について、該当の傷の場所を指で囲み、ボタン [登録] をタップします。\n損傷箇所の登録が完了したら、ボタン [完了して次へ進む] をタップします。\n傷が複数存在する場合は [+他の損傷箇所を撮影] をタップして、損傷箇所を追加撮影します。\n登録内容を確認して、ボタン [次へ] をタップします。\n■ ２. 車両情報を登録する\n次に車両情報を登録します。\nまず、国産・輸入車を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車両タイプを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車種名を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車体番号を選択します。写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、カラーコードとカラー種別を選択します。写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n■ ３. 損傷箇所の詳細情報を登録する\n次に、損傷箇所の詳細な情報を登録します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。\n詳細では、部位情報、割れの有無、凹みの有無、傷の縦と横の長さ、施工レベルを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_sekoten/sekoten_047.jpg", "img_sekoten/sekoten_048.jpg", "img_sekoten/sekoten_049.jpg", "img_sekoten/sekoten_050.jpg", "img_sekoten/sekoten_051.jpg", "img_sekoten/sekoten_052.jpg", "img_sekoten/sekoten_053.jpg", "img_sekoten/sekoten_054.jpg", "img_sekoten/sekoten_055.jpg", "img_sekoten/sekoten_056.jpg", "img_sekoten/sekoten_057.jpg", "img_sekoten/sekoten_058.jpg"]}, {"heading": "施工レベル", "blocks": [{"text": "■ ４. 訪問先住所を登録する", "images": []}, {"text": "デフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_sekoten/sekoten_059.jpg"]}, {"text": "■ ５. 納品希望日を指定する", "images": []}, {"text": "いつまでに納品を希望されるか、カレンダー上から日付を選択します。", "images": []}, {"text": "日付を選択すると納品時間を指定するポップアップが表示されますので、時間指定をして、[納品期日を設定する] を押下します。", "images": ["img_sekoten/sekoten_060.jpg", "img_sekoten/sekoten_061.jpg", "img_sekoten/sekoten_062.jpg"]}, {"text": "■ ６. 施工可能日を指定する", "images": []}, {"text": "納品期日までに、お客様がいつ施工に来訪可能かを、指定します。問題なければ、ボタン [次へ] を押下します。", "images": ["img_sekoten/sekoten_063.jpg"]}, {"text": "■ ７. 申し送り事項などを入力する", "images": []}, {"text": "施工に関して、何かしら申し送り事項がある場合に、情報を記載お願いいたします。", "images": []}, {"text": "※こちらに記載いただいた情報はお客様には非公開になります", "images": ["img_sekoten/sekoten_064.jpg"]}, {"text": "車両の登録を終える場合は、ボタン [車両登録を登録する] を押下します。", "images": ["img_sekoten/sekoten_065.jpg"]}, {"text": "車両登録が完了した旨のポップアップが表示されます。", "images": []}, {"text": "２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。", "images": []}, {"text": "登録を完了する場合は、ボタン [車両登録を完了する] を押下します。", "images": ["img_sekoten/sekoten_066.jpg"]}, {"text": "登録が完了すると、車両画面に、登録した車両が追加されます。", "images": []}, {"text": "表示すると、車両登録が完了して、お客様からの返答待ちである旨のシステムメッセージが表示されています。", "images": ["img_sekoten/sekoten_067.jpg", "img_sekoten/sekoten_068.jpg"]}, {"text": "見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": []}], "text": "■ ４. 訪問先住所を登録する\nデフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。\n■ ５. 納品希望日を指定する\nいつまでに納品を希望されるか、カレンダー上から日付を選択します。\n日付を選択すると納品時間を指定するポップアップが表示されますので、時間指定をして、[納品期日を設定する] を押下します。\n■ ６. 施工可能日を指定する\n納品期日までに、お客様がいつ施工に来訪可能かを、指定します。問題なければ、ボタン [次へ] を押下します。\n■ ７. 申し送り事項などを入力する\n施工に関して、何かしら申し送り事項がある場合に、情報を記載お願いいたします。\n※こちらに記載いただいた情報はお客様には非公開になります\n車両の登録を終える場合は、ボタン [車両登録を登録する] を押下します。\n車両登録が完了した旨のポップアップが表示されます。\n２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。\n登録を完了する場合は、ボタン [車両登録を完了する] を押下します。\n登録が完了すると、車両画面に、登録した車両が追加されます。\n表示すると、車両登録が完了して、お客様からの返答待ちである旨のシステムメッセージが表示されています。\n見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": ["img_sekoten/sekoten_059.jpg", "img_sekoten/sekoten_060.jpg", "img_sekoten/sekoten_061.jpg", "img_sekoten/sekoten_062.jpg", "img_sekoten/sekoten_063.jpg", "img_sekoten/sekoten_064.jpg", "img_sekoten/sekoten_065.jpg", "img_sekoten/sekoten_066.jpg", "img_sekoten/sekoten_067.jpg", "img_sekoten/sekoten_068.jpg"]}, {"heading": "トータルリペア本部からの指名依頼 / 自動マッチングが来た場合の流れ", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "加修作業は、トータルリペア本部からの指名依頼または、お客様の自動マッチングは、以下の 7 ステップで進行されます。", "images": []}, {"text": "Step 1\n依頼確認 ： Step 2\n作業確認 ： Step 3\n施行日決定 ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承諾 ： Step 8\nお支払", "images": []}, {"text": "Step1\n依頼確認 ： ■自動マッチングの場合\nシステム上でマッチングの報告があります。\n\n■指名依頼の場合\nアミークス本部から指名依頼がございますので、承諾頂ける場合は、作業承諾いただきます。", "images": []}, {"text": "Step2\n作業承諾 ： 作業内容に問題がなければ、作業承諾いただきます", "images": []}, {"text": "Step3\n施行日の決定 ： 施行日を決定いただきます", "images": []}, {"text": "Step4\n正式発注 ： お客様が正式発注されます", "images": []}, {"text": "Step5\n施工 ： 施工を行います", "images": []}, {"text": "Step6\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。", "images": []}, {"text": "Step7\n納品承諾 ： お客様に施工結果をご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}, {"text": "Step8\nお支払い ： 納品完了後、月末にお支払通知書をシステム内で発行させていただきます", "images": []}], "text": "加修作業は、トータルリペア本部からの指名依頼または、お客様の自動マッチングは、以下の 7 ステップで進行されます。\nStep 1\n依頼確認 ： Step 2\n作業確認 ： Step 3\n施行日決定 ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承諾 ： Step 8\nお支払\nStep1\n依頼確認 ： ■自動マッチングの場合\nシステム上でマッチングの報告があります。\n\n■指名依頼の場合\nアミークス本部から指名依頼がございますので、承諾頂ける場合は、作業承諾いただきます。\nStep2\n作業承諾 ： 作業内容に問題がなければ、作業承諾いただきます\nStep3\n施行日の決定 ： 施行日を決定いただきます\nStep4\n正式発注 ： お客様が正式発注されます\nStep5\n施工 ： 施工を行います\nStep6\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。\nStep7\n納品承諾 ： お客様に施工結果をご確認いただき、システムから納品承諾をいただいて、納品完了となります。\nStep8\nお支払い ： 納品完了後、月末にお支払通知書をシステム内で発行させていただきます", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "■ STEP1-2. 依頼確認〜作業承諾", "images": []}, {"text": "案件の依頼があった場合、システムメッセージが送信されます。", "images": []}, {"text": "詳細な情報は、[内容の確認] からご確認いただくことが可能になっております。", "images": []}, {"text": "■ トータルリペア本部からの指名依頼", "images": []}, {"text": "トータルリペア本部から指名の依頼があると、以下のとおりメッセージが表示されますので、作業承諾いただける場合は、[作業承諾する] ボタンをタップいただきます。", "images": ["img_sekoten/sekoten_069.jpg", "img_sekoten/sekoten_070.jpg", "img_sekoten/sekoten_071.jpg"]}, {"text": "対応が難しい場合は、[作業を見送る] から、お断りいただけます。", "images": []}, {"text": "■ 自動マッチング", "images": []}, {"text": "自動マッチングされた場合、システムから案件の公開メッセージが送信されます。", "images": []}, {"text": "エントリーされる場合は、[エントリー]  ボタンからエントリーいただくことで、案件が受注されます。", "images": ["img_sekoten/sekoten_072.jpg", "img_sekoten/sekoten_073.jpg"]}, {"text": "対応が難しい場合は、[案件を見送る] から、お断りいただけます。", "images": []}, {"text": "■ STEP3. 施行日の決定", "images": []}, {"text": "作業承諾いただいたあと、次に施行日を決定いただきます。", "images": []}, {"text": "以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。", "images": ["img_sekoten/sekoten_074.jpg"]}, {"text": "ボタンを押下すると、カレンダーが表示されます。", "images": []}, {"text": "お客様の空き日が表示されますので、ご都合が良い日をタップしてください。", "images": ["img_sekoten/sekoten_075.jpg"]}, {"text": "日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。", "images": ["img_sekoten/sekoten_076.jpg"]}, {"text": "ボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。", "images": ["img_sekoten/sekoten_077.jpg"]}, {"text": "■ STEP4. 正式発注", "images": []}, {"text": "お客様から正式発注があると、以下の通知がきますので、施行のご予定をお願いします。", "images": ["img_sekoten/sekoten_078.jpg"]}, {"text": "■ STEP5. 施行当日", "images": []}, {"text": "施行日の当日にご訪問いただき、施工を実施していただきます。", "images": []}, {"text": "■ STEP6. 納品", "images": []}, {"text": "[納品作業をする] をご参照ください。", "images": []}, {"text": "■ STEP7. 納品承諾", "images": []}, {"text": "お客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。", "images": []}, {"text": "月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_079.jpg"]}], "text": "■ STEP1-2. 依頼確認〜作業承諾\n案件の依頼があった場合、システムメッセージが送信されます。\n詳細な情報は、[内容の確認] からご確認いただくことが可能になっております。\n■ トータルリペア本部からの指名依頼\nトータルリペア本部から指名の依頼があると、以下のとおりメッセージが表示されますので、作業承諾いただける場合は、[作業承諾する] ボタンをタップいただきます。\n対応が難しい場合は、[作業を見送る] から、お断りいただけます。\n■ 自動マッチング\n自動マッチングされた場合、システムから案件の公開メッセージが送信されます。\nエントリーされる場合は、[エントリー]  ボタンからエントリーいただくことで、案件が受注されます。\n対応が難しい場合は、[案件を見送る] から、お断りいただけます。\n■ STEP3. 施行日の決定\n作業承諾いただいたあと、次に施行日を決定いただきます。\n以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。\nボタンを押下すると、カレンダーが表示されます。\nお客様の空き日が表示されますので、ご都合が良い日をタップしてください。\n日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。\nボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。\n■ STEP4. 正式発注\nお客様から正式発注があると、以下の通知がきますので、施行のご予定をお願いします。\n■ STEP5. 施行当日\n施行日の当日にご訪問いただき、施工を実施していただきます。\n■ STEP6. 納品\n[納品作業をする] をご参照ください。\n■ STEP7. 納品承諾\nお客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。\n月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_069.jpg", "img_sekoten/sekoten_070.jpg", "img_sekoten/sekoten_071.jpg", "img_sekoten/sekoten_072.jpg", "img_sekoten/sekoten_073.jpg", "img_sekoten/sekoten_074.jpg", "img_sekoten/sekoten_075.jpg", "img_sekoten/sekoten_076.jpg", "img_sekoten/sekoten_077.jpg", "img_sekoten/sekoten_078.jpg", "img_sekoten/sekoten_079.jpg"]}, {"heading": "トータルリペア本部から、訪問（常駐）予約を受けた場合の流れ", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "トータルリペア本部から訪問予約を受けた場合、お客様に見積り訪問に伺っていただきます。", "images": []}, {"text": "その場合、以下の 7 ステップで進行されます。", "images": []}, {"text": "Step 1\n依頼確認 ： Step 2\n作業確認 ： Step 3\n施行日決定 ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承諾 ： Step 8\nお支払", "images": []}, {"text": "Step1\n訪問予約", "images": []}, {"text": "Step2\n見積り ： Step1\n\n訪問日になったら、お客様に訪問し、対象車両の見積り登録をします。\n訪問ほう\n依頼確認", "images": []}, {"text": "Step3\n見積り確定 ： トータルリペア本部が見積り価格を確定します", "images": []}, {"text": "Step4\n作業承諾 ： トータルリペア本部から指名依頼がございますので、作業内容に問題がなければ、作業承諾いただきます", "images": []}, {"text": "Step5\n施行日の決定 ： 施行日を決定いただきます", "images": []}, {"text": "Step6\n正式発注 ： お客様が正式発注されます", "images": []}, {"text": "Step6\n施工 ： 施工を行います", "images": []}, {"text": "Step7\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。", "images": []}, {"text": "Step8\n納品承諾 ： お客様に施工結果をご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}, {"text": "Step9\nお支払い ： 納品完了後、月末にお支払通知書をシステム内で発行させていただきます", "images": []}], "text": "トータルリペア本部から訪問予約を受けた場合、お客様に見積り訪問に伺っていただきます。\nその場合、以下の 7 ステップで進行されます。\nStep 1\n依頼確認 ： Step 2\n作業確認 ： Step 3\n施行日決定 ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承諾 ： Step 8\nお支払\nStep1\n訪問予約\nStep2\n見積り ： Step1\n\n訪問日になったら、お客様に訪問し、対象車両の見積り登録をします。\n訪問ほう\n依頼確認\nStep3\n見積り確定 ： トータルリペア本部が見積り価格を確定します\nStep4\n作業承諾 ： トータルリペア本部から指名依頼がございますので、作業内容に問題がなければ、作業承諾いただきます\nStep5\n施行日の決定 ： 施行日を決定いただきます\nStep6\n正式発注 ： お客様が正式発注されます\nStep6\n施工 ： 施工を行います\nStep7\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。\nStep8\n納品承諾 ： お客様に施工結果をご確認いただき、システムから納品承諾をいただいて、納品完了となります。\nStep9\nお支払い ： 納品完了後、月末にお支払通知書をシステム内で発行させていただきます", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_sekoten/sekoten_080.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_sekoten/sekoten_081.jpg", "img_sekoten/sekoten_082.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_sekoten/sekoten_083.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP1. 訪問予約", "images": []}, {"text": "訪問予約のスケジュール確認がトータルリペア本部よりきますので、スケジュール問題なければ訪問が予約されます。", "images": []}, {"text": "訪問予約されると、メッセージ画面に、訪問予約が登録された旨のメッセージがきますので、ご予定ください。", "images": ["img_sekoten/sekoten_084.jpg"]}, {"text": "■ STEP2. 見積り登録", "images": []}, {"text": "[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。", "images": []}, {"text": "■ STEP4. 作業承諾", "images": []}, {"text": "作業承諾いただける場合は、[作業承諾する] ボタンを押下することで、作業受領となります。", "images": ["img_sekoten/sekoten_085.jpg"]}, {"text": "■ STEP4. 施行日の決定", "images": []}, {"text": "お客様が仮発注されたら、施行日を決定いただきます。", "images": []}, {"text": "以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。", "images": ["img_sekoten/sekoten_086.jpg"]}, {"text": "ボタンを押下すると、カレンダーが表示されます。", "images": []}, {"text": "お客様の空き日が表示されますので、ご都合が良い日をタップしてください。", "images": ["img_sekoten/sekoten_087.jpg"]}, {"text": "日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。", "images": ["img_sekoten/sekoten_088.jpg"]}, {"text": "ボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。", "images": ["img_sekoten/sekoten_089.jpg"]}, {"text": "■ STEP6. 施工", "images": []}, {"text": "施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。", "images": ["img_sekoten/sekoten_090.jpg"]}, {"text": "■ STEP7. 納品", "images": []}, {"text": "[納品作業をする] をご参照ください。", "images": []}], "text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP1. 訪問予約\n訪問予約のスケジュール確認がトータルリペア本部よりきますので、スケジュール問題なければ訪問が予約されます。\n訪問予約されると、メッセージ画面に、訪問予約が登録された旨のメッセージがきますので、ご予定ください。\n■ STEP2. 見積り登録\n[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。\n■ STEP4. 作業承諾\n作業承諾いただける場合は、[作業承諾する] ボタンを押下することで、作業受領となります。\n■ STEP4. 施行日の決定\nお客様が仮発注されたら、施行日を決定いただきます。\n以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。\nボタンを押下すると、カレンダーが表示されます。\nお客様の空き日が表示されますので、ご都合が良い日をタップしてください。\n日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。\nボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。\n■ STEP6. 施工\n施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。\n■ STEP7. 納品\n[納品作業をする] をご参照ください。", "images": ["img_sekoten/sekoten_080.jpg", "img_sekoten/sekoten_081.jpg", "img_sekoten/sekoten_082.jpg", "img_sekoten/sekoten_083.jpg", "img_sekoten/sekoten_084.jpg", "img_sekoten/sekoten_085.jpg", "img_sekoten/sekoten_086.jpg", "img_sekoten/sekoten_087.jpg", "img_sekoten/sekoten_088.jpg", "img_sekoten/sekoten_089.jpg", "img_sekoten/sekoten_090.jpg"]}, {"heading": "自店開拓のお客様が見積り登録された場合の流れ", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "施工店さんが自己開拓されたお客様がシステム上で見積り登録された場合、修理は、以下のステップで進行されます。", "images": []}, {"text": "Step 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\n施行日決定 ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品 ： Step 8\n納品承認 ： Step 9\nお支払", "images": []}, {"text": "Step1\n見積り ： お客様が見積り登録された場合、見積り確認依頼のシステムメッセージが、施工店さんに送信されます。", "images": []}, {"text": "Step2\n見積確定 ： 担当者がお客様の登録された仮見積りを精査して見積り金額を確定します。\nシステム上で、自動で確定したお見積書がお客様にご提示されます", "images": []}, {"text": "Step3\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません", "images": []}, {"text": "Step4\n施行日決定 ： 施行日を決定します", "images": []}, {"text": "Step5\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます\n\n→詳細は、[２．正式発注する] をご確認ください", "images": []}, {"text": "Step6\n施工 ： 施工を行います", "images": []}, {"text": "Step7\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。", "images": []}, {"text": "Step8\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください", "images": []}, {"text": "Step9\n御支払い ： 納品完了後、15日または末締めで、まとめて御請求となります。", "images": []}], "text": "施工店さんが自己開拓されたお客様がシステム上で見積り登録された場合、修理は、以下のステップで進行されます。\nStep 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\n施行日決定 ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品 ： Step 8\n納品承認 ： Step 9\nお支払\nStep1\n見積り ： お客様が見積り登録された場合、見積り確認依頼のシステムメッセージが、施工店さんに送信されます。\nStep2\n見積確定 ： 担当者がお客様の登録された仮見積りを精査して見積り金額を確定します。\nシステム上で、自動で確定したお見積書がお客様にご提示されます\nStep3\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\nStep4\n施行日決定 ： 施行日を決定します\nStep5\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます\n\n→詳細は、[２．正式発注する] をご確認ください\nStep6\n施工 ： 施工を行います\nStep7\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。\nStep8\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください\nStep9\n御支払い ： 納品完了後、15日または末締めで、まとめて御請求となります。", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_sekoten/sekoten_091.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_sekoten/sekoten_092.jpg", "img_sekoten/sekoten_093.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_sekoten/sekoten_094.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP2. 見積り確定", "images": []}, {"text": "お客様から送信された見積りは、まだ仮見積りがご提示された状態になりますので、内容を詳細にご確認いただき、見積り確定する必要がございます。", "images": []}, {"text": "以下のシステムメッセージ表示されますので、[見積りを確定する] ボタンから見積りを確定します。", "images": ["img_sekoten/sekoten_095.jpg"]}, {"text": "見積りを確定するボタンを押下すると、見積り内容が表示されます。", "images": []}, {"text": "見積りに変更がある場合は、見積価格の欄を修正して、正しい見積りに手動で変更します。", "images": []}, {"text": "価格に変更がない場合でも、[見積りを確定する] ボタンを押下して、見積りを確定します。", "images": ["img_sekoten/sekoten_096.jpg", "img_sekoten/sekoten_097.jpg"]}, {"text": "見積りを確定すると、以下のメッセージが表示されます。", "images": ["img_sekoten/sekoten_098.jpg"]}, {"text": "メッセージ上にも、確定されたことを知らせるメッセージが表示されます。", "images": ["img_sekoten/sekoten_099.jpg"]}, {"text": "■ STEP4. 施行日の決定", "images": []}, {"text": "お客様が仮発注されたら、施行日を決定いただきます。", "images": []}, {"text": "以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。", "images": ["img_sekoten/sekoten_100.jpg"]}, {"text": "ボタンを押下すると、カレンダーが表示されます。", "images": []}, {"text": "お客様の空き日が表示されますので、ご都合が良い日をタップしてください。", "images": ["img_sekoten/sekoten_101.jpg"]}, {"text": "日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。", "images": ["img_sekoten/sekoten_102.jpg"]}, {"text": "ボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。", "images": ["img_sekoten/sekoten_103.jpg"]}, {"text": "■ STEP5. 正式発注", "images": []}, {"text": "お客様が正式発注された場合、受注が確定した旨のメッセージが表示され、発注書が発行されますので、発注書をご確認ください。", "images": ["img_sekoten/sekoten_104.jpg", "img_sekoten/sekoten_105.jpg"]}, {"text": "■ STEP6. 施工", "images": []}, {"text": "施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。", "images": ["img_sekoten/sekoten_106.jpg"]}, {"text": "■ STEP7. 納品", "images": []}, {"text": "[納品作業をする] をご参照ください。", "images": []}, {"text": "■ STEP8. 納品承諾", "images": []}, {"text": "お客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。", "images": []}, {"text": "月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_107.jpg"]}], "text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP2. 見積り確定\nお客様から送信された見積りは、まだ仮見積りがご提示された状態になりますので、内容を詳細にご確認いただき、見積り確定する必要がございます。\n以下のシステムメッセージ表示されますので、[見積りを確定する] ボタンから見積りを確定します。\n見積りを確定するボタンを押下すると、見積り内容が表示されます。\n見積りに変更がある場合は、見積価格の欄を修正して、正しい見積りに手動で変更します。\n価格に変更がない場合でも、[見積りを確定する] ボタンを押下して、見積りを確定します。\n見積りを確定すると、以下のメッセージが表示されます。\nメッセージ上にも、確定されたことを知らせるメッセージが表示されます。\n■ STEP4. 施行日の決定\nお客様が仮発注されたら、施行日を決定いただきます。\n以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。\nボタンを押下すると、カレンダーが表示されます。\nお客様の空き日が表示されますので、ご都合が良い日をタップしてください。\n日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。\nボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。\n■ STEP5. 正式発注\nお客様が正式発注された場合、受注が確定した旨のメッセージが表示され、発注書が発行されますので、発注書をご確認ください。\n■ STEP6. 施工\n施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。\n■ STEP7. 納品\n[納品作業をする] をご参照ください。\n■ STEP8. 納品承諾\nお客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。\n月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_091.jpg", "img_sekoten/sekoten_092.jpg", "img_sekoten/sekoten_093.jpg", "img_sekoten/sekoten_094.jpg", "img_sekoten/sekoten_095.jpg", "img_sekoten/sekoten_096.jpg", "img_sekoten/sekoten_097.jpg", "img_sekoten/sekoten_098.jpg", "img_sekoten/sekoten_099.jpg", "img_sekoten/sekoten_100.jpg", "img_sekoten/sekoten_101.jpg", "img_sekoten/sekoten_102.jpg", "img_sekoten/sekoten_103.jpg", "img_sekoten/sekoten_104.jpg", "img_sekoten/sekoten_105.jpg", "img_sekoten/sekoten_106.jpg", "img_sekoten/sekoten_107.jpg"]}, {"heading": "自店開拓のお客様から見積り依頼があり、施工店さんが見積り登録される場合の流れ", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "お客様から見積り依頼があった場合、施工店さんがシステムから見積り登録を行うため、以下のステップで進行されます。", "images": []}, {"text": "Step 1\n見積り ： Step 2\n仮発注 ： Step 3\nマッチング ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承認 ： Step 8\nお支払", "images": []}, {"text": "Step1\n見積り ： お客様にご依頼いただいた損傷箇所のお見積りをします。\n見積り金額は、お客様のご状況に合わせて確定したお見積りを送信いただきます。", "images": []}, {"text": "Step2\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません", "images": []}, {"text": "Step3\n施行日の決定 ： 施行日を決定します", "images": []}, {"text": "Step4\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます", "images": []}, {"text": "Ste5\n施工 ： 施工を行います", "images": []}, {"text": "Step6\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。", "images": []}, {"text": "Step7\n納品承諾 ： お客様に施工結果を確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください", "images": []}, {"text": "Step8\n御支払い ： 納品完了後、月末にまとめてお支払となります。", "images": []}, {"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": []}], "text": "お客様から見積り依頼があった場合、施工店さんがシステムから見積り登録を行うため、以下のステップで進行されます。\nStep 1\n見積り ： Step 2\n仮発注 ： Step 3\nマッチング ： Step 4\n正式発注 ： Step 5\n施工 ： Step 6\n納品 ： Step 7\n納品承認 ： Step 8\nお支払\nStep1\n見積り ： お客様にご依頼いただいた損傷箇所のお見積りをします。\n見積り金額は、お客様のご状況に合わせて確定したお見積りを送信いただきます。\nStep2\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\nStep3\n施行日の決定 ： 施行日を決定します\nStep4\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます\nSte5\n施工 ： 施工を行います\nStep6\n納品 ： システムから、納品報告を行います。\n施工箇所の写真を撮影する必要があります。\nStep7\n納品承諾 ： お客様に施工結果を確認いただき、システムから納品承諾をいただいて、納品完了となります。\n\n→詳細は、[３．施工内容を確認して納品承諾する]   をご確認ください\nStep8\n御支払い ： 納品完了後、月末にまとめてお支払となります。\n依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_sekoten/sekoten_108.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_sekoten/sekoten_109.jpg", "img_sekoten/sekoten_110.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_sekoten/sekoten_111.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP1. お見積りを登録します", "images": []}, {"text": "[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。", "images": []}, {"text": "■ STEP3. 施行日の決定", "images": []}, {"text": "お客様から仮発注があるので、作業承諾いただいたあと、次に施行日を決定いただきます。", "images": []}, {"text": "以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。", "images": ["img_sekoten/sekoten_112.jpg"]}, {"text": "ボタンを押下すると、カレンダーが表示されます。", "images": []}, {"text": "お客様の空き日が表示されますので、ご都合が良い日をタップしてください。", "images": ["img_sekoten/sekoten_113.jpg"]}, {"text": "日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。", "images": ["img_sekoten/sekoten_114.jpg"]}, {"text": "ボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。", "images": ["img_sekoten/sekoten_115.jpg"]}, {"text": "■ STEP4. 正式発注", "images": []}, {"text": "お客様が正式発注された場合、受注が確定した旨のメッセージが表示され、発注書が発行されますので、発注書をご確認ください。", "images": ["img_sekoten/sekoten_116.jpg", "img_sekoten/sekoten_117.jpg"]}, {"text": "■ STEP5. 施工", "images": []}, {"text": "施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。", "images": ["img_sekoten/sekoten_118.jpg"]}, {"text": "■ STEP6. 納品", "images": []}, {"text": "[納品作業をする] をご参照ください。", "images": []}, {"text": "■ STEP7. 納品承諾", "images": []}, {"text": "お客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。", "images": []}, {"text": "月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_119.jpg"]}], "text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、ご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP1. お見積りを登録します\n[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。\n■ STEP3. 施行日の決定\nお客様から仮発注があるので、作業承諾いただいたあと、次に施行日を決定いただきます。\n以下のシステムメッセージが表示されますので、[施行日を申請する] を押下します。\nボタンを押下すると、カレンダーが表示されます。\nお客様の空き日が表示されますので、ご都合が良い日をタップしてください。\n日付をタップすると、施工時間を選択する画面がポップアップ表示されますので、時間を選択して [申請する] をタップします。\nボタンタップしますと、以下のシステムメッセージが表示され、お客様による正式発注待ちとなります。\n■ STEP4. 正式発注\nお客様が正式発注された場合、受注が確定した旨のメッセージが表示され、発注書が発行されますので、発注書をご確認ください。\n■ STEP5. 施工\n施行日当日になったら、施工のお知らせのメッセージが届きますので、お客様にご訪問いただき、施工を実施します。\n■ STEP6. 納品\n[納品作業をする] をご参照ください。\n■ STEP7. 納品承諾\nお客様が納品承諾されると、以下のメッセージが送信され、案件完了となります。\n月末にまとめて、お支払通知書を送信させていただく形となります。", "images": ["img_sekoten/sekoten_108.jpg", "img_sekoten/sekoten_109.jpg", "img_sekoten/sekoten_110.jpg", "img_sekoten/sekoten_111.jpg", "img_sekoten/sekoten_112.jpg", "img_sekoten/sekoten_113.jpg", "img_sekoten/sekoten_114.jpg", "img_sekoten/sekoten_115.jpg", "img_sekoten/sekoten_116.jpg", "img_sekoten/sekoten_117.jpg", "img_sekoten/sekoten_118.jpg", "img_sekoten/sekoten_119.jpg"]}, {"heading": "納品作業をする", "blocks": [{"text": "施工が完了したら納品報告を行います。", "images": []}, {"text": "以下の [完了報告を行う] ボタンから完了報告を行います。", "images": ["img_sekoten/sekoten_120.jpg"]}, {"text": "完了報告画面が表示されますので、[撮影] ボタンから施工後の損傷箇所の写真を撮影します。", "images": ["img_sekoten/sekoten_121.jpg"]}, {"text": "まずは、損傷箇所のアップの写真から撮影します。", "images": []}, {"text": "撮影が完了したら [次へ] ボタンを押下します。", "images": ["img_sekoten/sekoten_122.jpg", "img_sekoten/sekoten_123.jpg", "img_sekoten/sekoten_124.jpg"]}, {"text": "次に、損傷箇所の引きの写真から撮影します。", "images": []}, {"text": "撮影が完了したら [次へ] ボタンを押下します。", "images": ["img_sekoten/sekoten_125.jpg", "img_sekoten/sekoten_126.jpg", "img_sekoten/sekoten_127.jpg"]}, {"text": "すべての損傷箇所の撮影が完了したら、画面右下にある [次へ] ボタンを押下します。", "images": ["img_sekoten/sekoten_128.jpg"]}, {"text": "修理後の写真を撮影し直す場合は、引き、またはアップの写真をタップします。", "images": ["img_sekoten/sekoten_129.jpg"]}, {"text": "撮影した写真が表示されますので、[変更する] から写真を撮影し直します。", "images": ["img_sekoten/sekoten_130.jpg"]}, {"text": "価格を確認し、問題なければ、[提出する] ボタンを押下することで、施工完了報告を提出します。", "images": ["img_sekoten/sekoten_131.jpg"]}, {"text": "提出が完了したら、システムメッセージが表示されます。", "images": ["img_sekoten/sekoten_132.jpg"]}], "text": "施工が完了したら納品報告を行います。\n以下の [完了報告を行う] ボタンから完了報告を行います。\n完了報告画面が表示されますので、[撮影] ボタンから施工後の損傷箇所の写真を撮影します。\nまずは、損傷箇所のアップの写真から撮影します。\n撮影が完了したら [次へ] ボタンを押下します。\n次に、損傷箇所の引きの写真から撮影します。\n撮影が完了したら [次へ] ボタンを押下します。\nすべての損傷箇所の撮影が完了したら、画面右下にある [次へ] ボタンを押下します。\n修理後の写真を撮影し直す場合は、引き、またはアップの写真をタップします。\n撮影した写真が表示されますので、[変更する] から写真を撮影し直します。\n価格を確認し、問題なければ、[提出する] ボタンを押下することで、施工完了報告を提出します。\n提出が完了したら、システムメッセージが表示されます。", "images": ["img_sekoten/sekoten_120.jpg", "img_sekoten/sekoten_121.jpg", "img_sekoten/sekoten_122.jpg", "img_sekoten/sekoten_123.jpg", "img_sekoten/sekoten_124.jpg", "img_sekoten/sekoten_125.jpg", "img_sekoten/sekoten_126.jpg", "img_sekoten/sekoten_127.jpg", "img_sekoten/sekoten_128.jpg", "img_sekoten/sekoten_129.jpg", "img_sekoten/sekoten_130.jpg", "img_sekoten/sekoten_131.jpg", "img_sekoten/sekoten_132.jpg"]}, {"heading": "依頼された内容を確認する", "blocks": [{"text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_sekoten/sekoten_133.jpg"]}, {"text": "車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、", "images": []}, {"text": "その画面上で、依頼内容をご確認いただくことができます。", "images": ["img_sekoten/sekoten_134.jpg", "img_sekoten/sekoten_135.jpg"]}, {"text": "損傷箇所の詳細情報を閲覧する場合は、損傷箇所の矢印をタップします。", "images": ["img_sekoten/sekoten_136.jpg"]}, {"text": "損傷箇所の写真などが表示されるので、右から左にスワイプすると、閲覧することができます", "images": ["img_sekoten/sekoten_137.jpg"]}], "text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、\nその画面上で、依頼内容をご確認いただくことができます。\n損傷箇所の詳細情報を閲覧する場合は、損傷箇所の矢印をタップします。\n損傷箇所の写真などが表示されるので、右から左にスワイプすると、閲覧することができます", "im let IMGMAP={};

const PLACEHOLDER="data:image/svg+xml;base64,"+btoa('<svg xmlns="http://www.w3.org/2000/svg" width="110" height="160"><rect width="110" height="160" fill="#eee"/></svg>');
function IMG(path){return IMGMAP[path]||PLACEHOLDER;}
async function loadImages(r){
  if(IMG_LOADED[r])return;
  try{const res=await fetch(IMGFILE[r]);const j=await res.json();Object.assign(IMGMAP,j);IMG_LOADED[r]=true;
    document.querySelectorAll('img[data-p]').forEach(im=>{const dp=im.getAttribute('data-p');if(IMGMAP[dp]&&im.src!==IMGMAP[dp])im.src=IMGMAP[dp];});
  }catch(e){}
}

const STOP=new Set("の は が を に へ と で や も から まで より な だ です ます する した て ください 方法 教えて どう やり方 とは ？ ? 。 、 は？".split(/\s+/));
function tokenize(s){s=s.replace(/[、。！!？?（）()\[\]【】「」・]/g," ").toLowerCase();let t=[];s.split(/\s+/).forEach(w=>{if(w)t.push(w);});const jp=s.replace(/[^぀-ゟ゠-ヿ一-鿿ーａ-ｚＡ-Ｚ0-9a-z]/g,"");for(let i=0;i<jp.length-1;i++)t.push(jp.substr(i,2));return t.filter(x=>x.length>=2&&!STOP.has(x));}
function search(q){const qt=tokenize(q);if(!qt.length)return[];const secs=DATA.kbs[role].sections;const N=secs.length;const df={};qt.forEach(t=>{df[t]=secs.filter(s=>(s.heading+s.text).toLowerCase().includes(t)).length||1;});let r=secs.map(sec=>{const h=sec.heading.toLowerCase(),b=sec.text.toLowerCase();let sc=0;qt.forEach(t=>{const idf=Math.log(1+N/df[t]);const veryRare=df[t]<=2;const rare=df[t]<=Math.max(2,N*0.1);if(h.includes(t))sc+=6*idf;const bc=b.split(t).length-1;if(bc>0){sc+=Math.min(bc,4)*idf;if(veryRare)sc+=40;else if(rare)sc+=4*idf;}});return{sec,sc};}).filter(x=>x.sc>0);r.sort((a,b)=>b.sc-a.sc);return r.slice(0,5);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function hl(t,q){let h=esc(t);const ts=[...new Set(tokenize(q).filter(x=>x.length>=2))].sort((a,b)=>b.length-a.length).slice(0,8);ts.forEach(x=>{try{const re=new RegExp(x.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");h=h.replace(re,m=>"<mark>"+m+"</mark>");}catch(e){}});return h;}
function imgRow(imgs){if(!imgs||!imgs.length)return"";let h='<div class="shots">';imgs.forEach(s=>{const u=IMG(s);h+='<img loading="lazy" data-p="'+s+'" src="'+u+'" onclick="zoom(this.src)">';});return h+'</div>';}
function blocksHTML(sec,q){let h="";sec.blocks.forEach(b=>{if(b.text)h+='<div class="steptext">'+hl(b.text,q)+'</div>';if(b.images&&b.images.length)h+=imgRow(b.images);});return h;}
function shotsHTML(imgs,label){if(!imgs||!imgs.length)return"";let h='<div class="imgcount">📷 '+(label||'画面イメージ')+' '+imgs.length+'枚</div><div class="shots">';imgs.forEach(s=>{const u=IMG(s);h+='<img loading="lazy" data-p="'+s+'" src="'+u+'" onclick="zoom(this.src)">';});return h+'</div>';}
function zoom(src){document.getElementById('lbimg').src=src;document.getElementById('lb').style.display='flex';}

function addUser(t){const m=document.createElement('div');m.className='msg user';m.innerHTML='<div class="av">あ</div><div class="bubble"></div>';m.querySelector('.bubble').textContent=t;document.getElementById('inner').appendChild(m);scr();}
function addBot(html){const m=document.createElement('div');m.className='msg bot';const a=document.createElement('div');a.className='av';a.textContent='R';const b=document.createElement('div');b.className='bubble';b.innerHTML=html;m.appendChild(a);m.appendChild(b);document.getElementById('inner').appendChild(m);m.scrollIntoView({block:'start',behavior:'auto'});return b;}
function scr(){document.getElementById('chat').scrollTop=1e9;}
function showTyping(){const m=document.createElement('div');m.className='msg bot';m.id='typing';m.innerHTML='<div class="av">R</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>';document.getElementById('inner').appendChild(m);scr();}
function rmTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function render(){const inner=document.getElementById('inner');inner.innerHTML='';updStatus();addBot("こんにちは。<b>"+role+"</b>向けマニュアルについてお答えします。<br>下のボタンか、キーワード・質問を入力してください。");addSg();}
function addSg(){const d=document.createElement('div');d.className='suggest';d.id='sg';DATA.suggest[role].forEach(s=>{const b=document.createElement('button');b.textContent=s;b.onclick=()=>{document.getElementById('q').value=s;ask();};d.appendChild(b);});document.getElementById('inner').appendChild(d);}
function rmSg(){const s=document.getElementById('sg');if(s)s.remove();}

function ask(){const q=document.getElementById('q').value.trim();if(!q)return;document.getElementById('q').value='';rmSg();addUser(q);if(mode==='ai')askAI(q);else doSearch(q);}

function doSearch(q){const res=search(q);if(!res.length){addBot("該当する項目が見つかりませんでした。別のキーワードでお試しください（例：見積り、請求、ログイン）。");addSg();return;}
let html="「<b>"+esc(q)+"</b>」に関連する項目が "+res.length+" 件見つかりました。見出しをタップで本文と画面が開きます。";
res.forEach((r,idx)=>{const op=idx===0?" open":"";html+='<div class="result'+op+'"><div class="rh" onclick="this.parentNode.classList.toggle(\'open\')"><span>'+esc(r.sec.heading)+'</span><span class="ic">'+(r.sec.images.length?('📷'+r.sec.images.length):'')+' ▾</span></div><div class="rb"><div class="steptext">'+hl(r.sec.text,q)+'</div>'+shotsHTML(r.sec.images)+'</div></div>';});
addBot(html);addSg();}

async function askAI(q){

  history[role].push({role:'user',content:q});
  document.getElementById('send').disabled=true;showTyping();
  // pick relevant sections for grounding; #1 hit is authoritative
  const res=search(q);
  const top=res.length?res[0].sec:null;
  const HINT=res.slice(0,3).map((r,i)=>"### 関連箇所"+(i+1)+"：「"+r.sec.heading+"」\n"+r.sec.text).join("\n\n");
  const KB_TEXT=(HINT?("=== この質問に最も関連する箇所（ここを最優先で根拠にする。特に『関連箇所1』を最優先）===\n"+HINT+"\n\n"):"")+"=== マニュアル全文（補助）===\n"+DATA.kbs[role].sections.map(s=>"## "+s.heading+"\n"+s.text).join("\n\n");
  const SYS="あなたは「リペモ（RePaMo）」の"+role+"向けマニュアルに関する質問に答えるアシスタントです。以下のマニュアル本文を根拠に日本語で回答してください。ルール:(1)冒頭の『関連箇所1』を最優先の根拠とし、その見出しの操作がユーザーの質問に該当する場合は、必ずそのセクションに書かれた手順だけを使って番号付きで答える。複数の関連箇所がある場合でも、質問内容に合致する操作を選び、別の操作（例：通常のスケジュール予定追加と、訪問予約からの常駐設定は別物）を混同しない。(2)『常駐』の登録について聞かれた場合は、カレンダーへの予定追加ではなく、訪問予約（施工店アサイン）の確認画面にある『常駐を設定するボタン』を使う手順を答える。(3)本文のどこにも該当手順が無い場合のみ、別操作を流用せず『この"+role+"向けマニュアルには、その操作の手順が記載されていません。本部・管理者にご確認ください。』と答える。(4)手順は番号付きで簡潔に。(5)ボタン名はマニュアル表記（例:[訪問予約を登録する]）をそのまま使う。(6)最後に『参照: 〜』で実際に根拠にしたセクション見出しを1行で書く。\n\n"+KB_TEXT;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model:model,max_tokens:1024,system:SYS,messages:history[role].slice(-8)})});
    rmTyping();
    if(!r.ok){const e=await r.text();addBot("エラー（"+r.status+"）。時間をおいて再度お試しください。<br>"+esc(e.slice(0,200)));}
    else{const d=await r.json();const ans=d.content.map(c=>c.text||'').join('');let h=esc(ans).replace(/\n/g,'<br>');if(top){h+='<div class="refimgs"><div class="imgcount">📖 マニュアル該当箇所「'+esc(top.heading)+'」（手順ごとの画面）</div>'+blocksHTML(top,q)+'</div>';}addBot(h);history[role].push({role:'assistant',content:ans});}
  }catch(err){rmTyping();addBot("通信エラー: "+esc(err.message));}
  document.getElementById('send').disabled=false;addSg();
}

document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.shiftKey){e.preventDefault();ask();}else if(e.key==='Enter'){e.preventDefault();}});
applyAccent();buildTabs();loadImages(role);render();
</script></body></html>
