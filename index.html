<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リペモ マニュアル チャットbot（統合版）</title>
<style>
:root{ --accent:#3646AB; }
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;background:#f4f5f7;color:#1a1a1a;height:100vh;display:flex;flex-direction:column;}
header{background:var(--accent);color:#fff;padding:12px 18px;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:background .2s;}
.htop{display:flex;align-items:center;gap:10px;}
.htop h1{font-size:16px;margin:0;font-weight:700;flex:1;}
.htop .set{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 11px;border-radius:8px;cursor:pointer;font-size:12px;}
.tabs{display:flex;gap:6px;margin-top:10px;}
.tabs .role{flex:1;background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.tabs .role.active{background:#fff;color:var(--accent);}
.modebar{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;}
.modebar .seg{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden;}
.modebar .seg button{background:none;border:none;color:#fff;padding:6px 12px;cursor:pointer;font-size:12px;}
.modebar .seg button.on{background:#fff;color:var(--accent);font-weight:700;}
.modebar .st{opacity:.85;margin-left:auto;}
#chat{flex:1;overflow-y:auto;padding:18px;}
#inner{max-width:860px;margin:0 auto;}
.msg{margin-bottom:16px;display:flex;gap:10px;}
.msg .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;}
.msg.user{flex-direction:row-reverse;}
.msg.user .av{background:#888;}
.msg.bot .av{background:var(--accent);}
.bubble{padding:12px 15px;border-radius:12px;line-height:1.75;font-size:15px;word-break:break-word;}
.msg.bot .bubble{background:#fff;border:1px solid #e5e7eb;max-width:92%;}
.msg.user .bubble{background:var(--accent);color:#fff;max-width:80%;white-space:pre-wrap;}
.result{margin-top:10px;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#fff;}
.result .rh{background:#f0f1f5;padding:10px 13px;font-weight:700;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;gap:8px;}
.result .rh .ic{font-size:12px;color:var(--accent);}
.result .rb{padding:12px 14px;border-top:1px solid #eee;display:none;}
.result.open .rb{display:block;}
.result .rh:hover{background:#e8eaf0;}
.steptext{font-size:14px;line-height:1.85;white-space:pre-wrap;margin-bottom:10px;}
.shots{display:flex;flex-wrap:wrap;gap:8px;}
.shots img{width:110px;height:auto;flex:0 0 110px;object-fit:contain;border:1px solid #ddd;border-radius:6px;cursor:zoom-in;background:#fafafa;}
.imgcount{font-size:12px;color:#888;margin:4px 0;}
.refimgs{margin-top:8px;}
.suggest{max-width:860px;margin:4px auto 12px;display:flex;flex-wrap:wrap;gap:8px;}
.suggest button{background:#fff;border:1px solid var(--accent);color:var(--accent);padding:8px 13px;border-radius:18px;cursor:pointer;font-size:13px;}
.suggest button:hover{background:var(--accent);color:#fff;}
#inputBar{padding:12px 18px;background:#fff;border-top:1px solid #e5e7eb;}
#ii{max-width:860px;margin:0 auto;display:flex;gap:10px;}
#q{flex:1;padding:12px 15px;border:1px solid #ccc;border-radius:24px;font-size:15px;font-family:inherit;}
#send{background:var(--accent);color:#fff;border:none;width:46px;height:46px;border-radius:50%;cursor:pointer;font-size:18px;flex-shrink:0;}
mark{background:#fde68a;padding:0 1px;border-radius:2px;}
.hint{font-size:11px;color:#888;text-align:center;padding:5px;}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out;}
#lb img{max-width:94%;max-height:94%;border-radius:6px;}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#aaa;margin:0 2px;animation:b 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes b{0%,60%,100%{opacity:.3;}30%{opacity:1;}}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:16px;}
#modalbox{background:#fff;border-radius:14px;padding:24px;max-width:520px;width:100%;}
#modalbox h2{margin-top:0;font-size:17px;}
#modalbox p{font-size:13px;color:#555;line-height:1.7;}
#modalbox input,#modalbox select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;margin:6px 0;}
#modalbox .btns{display:flex;gap:8px;margin-top:10px;}
#modalbox button{flex:1;padding:11px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;}
#modalbox .ok{background:var(--accent);color:#fff;}
#modalbox .cancel{background:#eee;color:#333;}
#modalbox .note{font-size:11px;color:#999;margin-top:10px;line-height:1.6;}
</style></head><body>
<header>
 <div class="htop"><h1>リペモ マニュアル チャットbot</h1>
   </div>
 <div class="tabs" id="tabs"></div>
 <div class="modebar">
   <div class="seg"><button id="mSearch" class="on" onclick="setMode('search')">🔍 検索モード</button><button id="mAI" onclick="setMode('ai')">🤖 AI回答</button></div>
   <span class="st" id="status"></span>
 </div>
</header>
<div id="chat"><div id="inner"></div></div>
<div id="inputBar"><div id="ii"><input type="text" id="q" placeholder="キーワードや質問を入力（送信：Shift+Enter）"><button id="send" onclick="ask()">➤</button></div></div>
<div class="hint" id="hint"></div>
<div id="lb" onclick="this.style.display='none'"><img id="lbimg"></div>

_honbu/honbu_017.jpg"]}, {"text": "以下の画面が表示されますので、メールを確認ください。", "images": ["img_honbu/honbu_018.jpg"]}, {"text": "メールを確認すると、URLが表示されていますので、そちらのURLを押下します。", "images": ["img_honbu/honbu_019.jpg"]}, {"text": "新たにパスワードを設定してボタン [登録する] を押下して、パスワードの更新が完了します。", "images": ["img_honbu/honbu_020.jpg"]}], "text": "「ログインでお困りの方」リンクからパスワードリセットを行います。\nメールアドレスに、自分のメールアドレスを入力して、ボタン [パスワードをリセットする] を押下します。\n以下の画面が表示されますので、メールを確認ください。\nメールを確認すると、URLが表示されていますので、そちらのURLを押下します。\n新たにパスワードを設定してボタン [登録する] を押下して、パスワードの更新が完了します。", "images": ["img_honbu/honbu_017.jpg", "img_honbu/honbu_018.jpg", "img_honbu/honbu_019.jpg", "img_honbu/honbu_020.jpg"]}, {"heading": "その他ログインや、ご利用前にシステムに関するお問い合わせをしたい場合", "blocks": [{"text": "以下のお問い合わせリンクから、お問い合わせください。", "images": ["img_honbu/honbu_021.jpg"]}, {"text": "各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。", "images": []}, {"text": "管理者からのご連絡をお待ちください。", "images": ["img_honbu/honbu_022.jpg"]}], "text": "以下のお問い合わせリンクから、お問い合わせください。\n各お問い合わせ項目を入力して、ボタン [送信する] を押下することで、お問い合わせの送信が完了します。\n管理者からのご連絡をお待ちください。", "images": ["img_honbu/honbu_021.jpg", "img_honbu/honbu_022.jpg"]}, {"heading": "損傷箇所の見積りをする", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "AIで自動見積りをする", "blocks": [{"text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_honbu/honbu_023.jpg"]}, {"text": "車両画面が表示されるので、画面中のボタン [新規見積] を押下します。", "images": ["img_honbu/honbu_024.jpg"]}, {"text": "■ １. 車両の写真を登録する", "images": []}, {"text": "新規見積画面が表示されますので、まずは、該当車両のコーションプレートの写真をアップロードします。", "images": ["img_honbu/honbu_025.jpg"]}], "text": "修理の見積り（または依頼）を自動で行う場合は、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面が表示されるので、画面中のボタン [新規見積] を押下します。\n■ １. 車両の写真を登録する\n新規見積画面が表示されますので、まずは、該当車両のコーションプレートの写真をアップロードします。", "images": ["img_honbu/honbu_023.jpg", "img_honbu/honbu_024.jpg", "img_honbu/honbu_025.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "コーションプレートの写真をアップロードした後、ボタン [次の写真へ] を押下します。", "images": ["img_honbu/honbu_026.jpg"]}, {"text": "次に、車両の全体写真をアップロードします。", "images": ["img_honbu/honbu_027.jpg"]}], "text": "コーションプレートの写真をアップロードした後、ボタン [次の写真へ] を押下します。\n次に、車両の全体写真をアップロードします。", "images": ["img_honbu/honbu_026.jpg", "img_honbu/honbu_027.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "次に損傷箇所の画像を登録します。", "images": []}, {"text": "まず、ボタン [損傷箇所を追加] を押下します。", "images": ["img_honbu/honbu_028.jpg"]}, {"text": "車の見開き図が表示されますので、損傷箇所の場所をクリック（タップ）し、ボタン [次へ] を押下します", "images": ["img_honbu/honbu_029.jpg", "img_honbu/honbu_030.jpg"]}, {"text": "次に、損傷箇所の引きの写真をアップロードします。案内が表示されますので、確認した上で、ボタン [写真を選択する] を押下して、写真をアップロードします。", "images": ["img_honbu/honbu_031.jpg"]}], "text": "次に損傷箇所の画像を登録します。\nまず、ボタン [損傷箇所を追加] を押下します。\n車の見開き図が表示されますので、損傷箇所の場所をクリック（タップ）し、ボタン [次へ] を押下します\n次に、損傷箇所の引きの写真をアップロードします。案内が表示されますので、確認した上で、ボタン [写真を選択する] を押下して、写真をアップロードします。", "images": ["img_honbu/honbu_028.jpg", "img_honbu/honbu_029.jpg", "img_honbu/honbu_030.jpg", "img_honbu/honbu_031.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "写真選択後、損傷箇所をマウスで囲って選択し、ボタン [登録] を押下します。", "images": ["img_honbu/honbu_032.jpg", "img_honbu/honbu_033.jpg"]}, {"text": "次に、損傷箇所のアップの写真をアップロードします。", "images": ["img_honbu/honbu_034.jpg"]}], "text": "写真選択後、損傷箇所をマウスで囲って選択し、ボタン [登録] を押下します。\n次に、損傷箇所のアップの写真をアップロードします。", "images": ["img_honbu/honbu_032.jpg", "img_honbu/honbu_033.jpg", "img_honbu/honbu_034.jpg"]}, {"heading": "撮影のポイント", "blocks": [{"text": "写真選択後、損傷箇所を囲って選択し、ボタン [登録] を押下します", "images": ["img_honbu/honbu_035.jpg", "img_honbu/honbu_036.jpg"]}, {"text": "損傷箇所の登録が完了したらボタン [次へ] を押下します。傷が複数箇所存在する場合は、ボタン [損傷箇所を追加] から再度、損傷箇所の登録を行います。", "images": ["img_honbu/honbu_037.jpg"]}, {"text": "■ ２. 車両情報を登録する", "images": []}, {"text": "次に車両情報を登録します。", "images": []}, {"text": "まず、国産・輸入車を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_038.jpg"]}, {"text": "次に、車両タイプを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_039.jpg"]}, {"text": "次に、車種名を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_040.jpg"]}, {"text": "次に、車体番号を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_041.jpg"]}, {"text": "次に、カラーコードとカラー種別を選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_042.jpg"]}, {"text": "■ ３. 損傷箇所の詳細情報を登録する", "images": []}, {"text": "次に、損傷箇所の詳細な情報を登録します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。", "images": ["img_honbu/honbu_043.jpg"]}, {"text": "詳細では、部位情報、割れの有無、ゆがみの有無、傷の縦と横の長さ、施工レベルを選択します。", "images": []}, {"text": "写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_honbu/honbu_044.jpg"]}], "text": "写真選択後、損傷箇所を囲って選択し、ボタン [登録] を押下します\n損傷箇所の登録が完了したらボタン [次へ] を押下します。傷が複数箇所存在する場合は、ボタン [損傷箇所を追加] から再度、損傷箇所の登録を行います。\n■ ２. 車両情報を登録する\n次に車両情報を登録します。\nまず、国産・輸入車を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車両タイプを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車種名を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、車体番号を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n次に、カラーコードとカラー種別を選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、ご確認の上、ボタン [次へ] を押下してください。\n■ ３. 損傷箇所の詳細情報を登録する\n次に、損傷箇所の詳細な情報を登録します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、損傷箇所を選択して、詳細情報を表示します。\n詳細では、部位情報、割れの有無、ゆがみの有無、傷の縦と横の長さ、施工レベルを選択します。\n写真からAIが情報解析して適切な情報が自動選択された状態になりますが、詳細をご確認ください。", "images": ["img_honbu/honbu_035.jpg", "img_honbu/honbu_036.jpg", "img_honbu/honbu_037.jpg", "img_honbu/honbu_038.jpg", "img_honbu/honbu_039.jpg", "img_honbu/honbu_040.jpg", "img_honbu/honbu_041.jpg", "img_honbu/honbu_042.jpg", "img_honbu/honbu_043.jpg", "img_honbu/honbu_044.jpg"]}, {"heading": "施工レベル", "blocks": [{"text": "■ ４. 訪問先住所を登録する", "images": []}, {"text": "デフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。", "images": ["img_honbu/honbu_045.jpg"]}, {"text": "■ ５. 納品希望日を指定する", "images": []}, {"text": "いつまでに納品を希望されるか、カレンダー上から日付を選択します。", "images": ["img_honbu/honbu_046.jpg"]}, {"text": "日付を選択した後、ポップアップが表示されますので、何時までに納品が必要かを指定された上で、ボタン [納品期日を設定する] を押下します。", "images": ["img_honbu/honbu_047.jpg"]}, {"text": "■ ６. 施工可能日を指定する", "images": []}, {"text": "納品期日までに、いつ施工に来訪可能か、指定します。", "images": []}, {"text": "問題なければ、ボタン [車両を登録する] を押下して、車両登録を完了します。", "images": ["img_honbu/honbu_048.jpg"]}, {"text": "車両の登録を終える場合は、ボタン [車両登録を完了する] を押下します。", "images": []}, {"text": "２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。", "images": ["img_honbu/honbu_049.jpg"]}, {"text": "車両画面に、登録した車両が追加され、見積情報の登録が完了したことを知らせるメッセージが届きます。", "images": ["img_honbu/honbu_050.jpg"]}, {"text": "見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": []}], "text": "■ ４. 訪問先住所を登録する\nデフォルトでお客様の登録住所が入りますが、別の場所で施工が必要な場合は、ご指定の住所などを入力いただき、ご確認の上、ボタン [次へ] を押下してください。\n■ ５. 納品希望日を指定する\nいつまでに納品を希望されるか、カレンダー上から日付を選択します。\n日付を選択した後、ポップアップが表示されますので、何時までに納品が必要かを指定された上で、ボタン [納品期日を設定する] を押下します。\n■ ６. 施工可能日を指定する\n納品期日までに、いつ施工に来訪可能か、指定します。\n問題なければ、ボタン [車両を登録する] を押下して、車両登録を完了します。\n車両の登録を終える場合は、ボタン [車両登録を完了する] を押下します。\n２台目以降を登録されたい場合は、ボタン [+次の車両を登録] を押下して、手順の最初に戻り、車両登録を行います。\n車両画面に、登録した車両が追加され、見積情報の登録が完了したことを知らせるメッセージが届きます。\n見積り完了後の流れについては、[加修作業の流れ] をご確認ください。", "images": ["img_honbu/honbu_045.jpg", "img_honbu/honbu_046.jpg", "img_honbu/honbu_047.jpg", "img_honbu/honbu_048.jpg", "img_honbu/honbu_049.jpg", "img_honbu/honbu_050.jpg"]}, {"heading": "見積りをメッセージで依頼する", "blocks": [{"text": "見積りを別途メッセージでご依頼頂く場合は、 [ 損傷箇所以外で、メッセージを送りたい] をご参照ください。", "images": []}], "text": "見積りを別途メッセージでご依頼頂く場合は、 [ 損傷箇所以外で、メッセージを送りたい] をご参照ください。", "images": []}, {"heading": "本部開拓の加修作業の流れ（お客様が見積り）", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "お客様自身でお見積りいただいた場合は、以下の 8 ステップで進行されます。", "images": []}, {"text": "Step 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\nマッチング ： Step 5\n日程決め ： Step 6\n正式発注 ： Step 7\n施工 ： Step 8\n納品 ： Step 9\n納品承認", "images": []}, {"text": "Step1\n見積り ： お客様が見積りを作成します。", "images": []}, {"text": "Step2\n見積確定 ： 見積りを精査して見積り金額の確定をし、お見積書をご提示します", "images": []}, {"text": "Step3\n仮発注 ： お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません", "images": []}, {"text": "Step4\n施工店\n 自動マッチング\n 手動選択 ： ご担当施工店のマッチングを行います", "images": []}, {"text": "Step5\n作業承諾\n作業日程決め ： 施工店が作業承諾して、作業日程を確定させます。", "images": []}, {"text": "Step6\n正式発注 ： システムから正式発注いただき、発注書が自動発行されます", "images": []}, {"text": "Step7\n施工 ： 施工店が、施工を行います", "images": []}, {"text": "Step8\n納品 ： 施工店が、納品をします", "images": []}, {"text": "Step9\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}], "text": "お客様自身でお見積りいただいた場合は、以下の 8 ステップで進行されます。\nStep 1\n見積り ： Step 2\n見積確定 ： Step 3\n仮発注 ： Step 4\nマッチング ： Step 5\n日程決め ： Step 6\n正式発注 ： Step 7\n施工 ： Step 8\n納品 ： Step 9\n納品承認\nStep1\n見積り ： お客様が見積りを作成します。\nStep2\n見積確定 ： 見積りを精査して見積り金額の確定をし、お見積書をご提示します\nStep3\n仮発注 ： お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\nStep4\n施工店\n 自動マッチング\n 手動選択 ： ご担当施工店のマッチングを行います\nStep5\n作業承諾\n作業日程決め ： 施工店が作業承諾して、作業日程を確定させます。\nStep6\n正式発注 ： システムから正式発注いただき、発注書が自動発行されます\nStep7\n施工 ： 施工店が、施工を行います\nStep8\n納品 ： 施工店が、納品をします\nStep9\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_honbu/honbu_051.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_honbu/honbu_052.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_honbu/honbu_053.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP2. 見積確定", "images": []}, {"text": "お客様が見積りを作成すると、トータルリペア本部に対して見積り作成のメッセージが送信されます。", "images": []}], "text": "依頼された車両の進行状況を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP2. 見積確定\nお客様が見積りを作成すると、トータルリペア本部に対して見積り作成のメッセージが送信されます。", "images": ["img_honbu/honbu_051.jpg", "img_honbu/honbu_052.jpg", "img_honbu/honbu_053.jpg"]}, {"heading": "💡お客様が作成された見積りは、まだ仮見積りの状態になりますので、ここから見積りを確定させる必要があります。", "blocks": [{"text": "", "images": ["img_honbu/honbu_054.jpg"]}, {"text": "[見積りを確定する] ボタンを押下すると、見積り内容の変更画面へ遷移します。", "images": ["img_honbu/honbu_055.jpg"]}, {"text": "見積り価格の変更がある場合、見積り価格のテキストボックスの価格を変更していただきます。", "images": ["img_honbu/honbu_056.jpg"]}, {"text": "変更されたら [見積りを確定する]  ボタンを押下します。", "images": []}], "text": "[見積りを確定する] ボタンを押下すると、見積り内容の変更画面へ遷移します。\n見積り価格の変更がある場合、見積り価格のテキストボックスの価格を変更していただきます。\n変更されたら [見積りを確定する]  ボタンを押下します。", "images": ["img_honbu/honbu_054.jpg", "img_honbu/honbu_055.jpg", "img_honbu/honbu_056.jpg"]}, {"heading": "💡見積り価格に変更がない場合は、そのまま確定するボタンを押下します", "blocks": [{"text": "", "images": ["img_honbu/honbu_057.jpg"]}, {"text": "見積りを確定が完了すると、以下のポップアップが表示されます。", "images": ["img_honbu/honbu_058.jpg"]}, {"text": "確定すると、以下のシステムメッセージが送信されます。", "images": ["img_honbu/honbu_059.jpg"]}, {"text": "■ STEP4. 施工店 指名依頼 / 自動マッチング", "images": []}, {"text": "施工店を指名依頼するか、自動マッチングさせるかを選択します。", "images": ["img_honbu/honbu_060.jpg"]}, {"text": "■ 施工店を選択する", "images": []}, {"text": "施工店を選択する場合、施工店選択画面が表示されますので、こちらの一覧から担当の施工店を選択します。", "images": ["img_honbu/honbu_061.jpg"]}, {"text": "■ 自動マッチングする", "images": []}, {"text": "[自動マッチングする] ボタンを押下すると、マッチングが開始されます。", "images": ["img_honbu/honbu_062.jpg"]}, {"text": "マッチングは、お客様のアカウント設定の優先度1〜優先度3に設定されたお客様に対して、順番に公開されます。", "images": ["img_honbu/honbu_063.jpg"]}], "text": "見積りを確定が完了すると、以下のポップアップが表示されます。\n確定すると、以下のシステムメッセージが送信されます。\n■ STEP4. 施工店 指名依頼 / 自動マッチング\n施工店を指名依頼するか、自動マッチングさせるかを選択します。\n■ 施工店を選択する\n施工店を選択する場合、施工店選択画面が表示されますので、こちらの一覧から担当の施工店を選択します。\n■ 自動マッチングする\n[自動マッチングする] ボタンを押下すると、マッチングが開始されます。\nマッチングは、お客様のアカウント設定の優先度1〜優先度3に設定されたお客様に対して、順番に公開されます。", "images": ["img_honbu/honbu_057.jpg", "img_honbu/honbu_058.jpg", "img_honbu/honbu_059.jpg", "img_honbu/honbu_060.jpg", "img_honbu/honbu_061.jpg", "img_honbu/honbu_062.jpg", "img_honbu/honbu_063.jpg"]}, {"heading": "自動マッチングの流れ\n\n　　　　　　　　　　　　　　　　　　　　　🔻\n　　　　　　　　　　　　　　　　　　　　　🔻\n\n■ マッチング待機時間設定画面", "blocks": [{"text": "施工店がマッチングすると、マッチングの通知が表示されます。", "images": ["img_honbu/honbu_064.jpg"]}, {"text": "■ STEP6. 正式発注する", "images": []}, {"text": "お客様が正式発注されると、発注書が発行されます。", "images": ["img_honbu/honbu_065.jpg"]}], "text": "施工店がマッチングすると、マッチングの通知が表示されます。\n■ STEP6. 正式発注する\nお客様が正式発注されると、発注書が発行されます。", "images": ["img_honbu/honbu_064.jpg", "img_honbu/honbu_065.jpg"]}, {"heading": "本部開拓の加修作業の流れ（本部が見積り）", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "加修作業の流れ", "blocks": [{"text": "本部が依頼を受けて、本部が見積り作業を行う流れは、以下の 8 ステップで進行されます。", "images": []}, {"text": "Step 1\n見積り ： Step 2\n仮発注 ： Step 3\nマッチング ： Step 4\n日程決め ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品 ： Step 8\n納品承認", "images": []}, {"text": "Step1\n見積り ： お客様にご依頼いただいた損傷箇所のお見積りをします。\n見積り金額は、お客様のご状況に合わせて確定したお見積りを送信いただきます。", "images": []}, {"text": "Step2\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません", "images": []}, {"text": "Step3\n施工店\n 自動マッチング\n 手動選択 ： ご担当施工店のマッチングを行います", "images": []}, {"text": "Step4\n作業承諾\n作業日程決め ： 施工店が作業承諾して、作業日程を確定させます。", "images": []}, {"text": "Step5\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます", "images": []}, {"text": "Step6\n施工 ： 施工店が、施工当日に施工を行います。", "images": []}, {"text": "Step7\n納品 ： 施工店が、納品を行います。", "images": []}, {"text": "Step8\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}], "text": "本部が依頼を受けて、本部が見積り作業を行う流れは、以下の 8 ステップで進行されます。\nStep 1\n見積り ： Step 2\n仮発注 ： Step 3\nマッチング ： Step 4\n日程決め ： Step 5\n正式発注 ： Step 6\n施工 ： Step 7\n納品 ： Step 8\n納品承認\nStep1\n見積り ： お客様にご依頼いただいた損傷箇所のお見積りをします。\n見積り金額は、お客様のご状況に合わせて確定したお見積りを送信いただきます。\nStep2\n仮発注 ： お客様が、お見積りに対して、システムから仮発注を行っていただきます\n※この状態はまだ担当施工店が決定しておりませんので、本発注ではございません\nStep3\n施工店\n 自動マッチング\n 手動選択 ： ご担当施工店のマッチングを行います\nStep4\n作業承諾\n作業日程決め ： 施工店が作業承諾して、作業日程を確定させます。\nStep5\n正式発注 ： お客様がシステムから正式発注いただき、発注書が自動発行されます\nStep6\n施工 ： 施工店が、施工当日に施工を行います。\nStep7\n納品 ： 施工店が、納品を行います。\nStep8\n納品承諾 ： 施工した結果をお客様にご確認いただき、システムから納品承諾をいただいて、納品完了となります。", "images": []}, {"heading": "依頼を進行する", "blocks": [{"text": "依頼車両の進行状況を確認するには、画面上部メニュー [車両] を押下して車両画面を表示します。", "images": ["img_honbu/honbu_066.jpg"]}, {"text": "各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。", "images": ["img_honbu/honbu_067.jpg"]}, {"text": "車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。", "images": ["img_honbu/honbu_068.jpg"]}, {"text": "すべて ： すべての車両が表示されます", "images": []}, {"text": "要対応 ： お客様が対応が必要な車両が表示されます", "images": []}, {"text": "未発注 ： 未発注の車両が表示されます", "images": []}, {"text": "進行中 ： 発注後、進行中の車両が表示されます", "images": []}, {"text": "納品済み ： 納品が完了した車両が表示されます", "images": []}, {"text": "進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。", "images": []}, {"text": "■ STEP1. 見積りを登録する", "images": []}, {"text": "[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。", "images": []}, {"text": "■ STEP3. 施工店 指名依頼 / 自動マッチング", "images": []}, {"text": "施工店を指名依頼するか、自動マッチングさせるかを選択します。", "images": ["img_honbu/honbu_069.jpg"]}, {"text": "■ 施工店を選択する", "images": []}, {"text": "施工店を選択する場合、施工店選択画面が表示されますので、こちらの一覧から担当の施工店を選択します。", "images": ["img_honbu/honbu_070.jpg"]}, {"text": "■ 自動マッチングする", "images": []}, {"text": "[自動マッチングする] ボタンを押下すると、マッチングが開始されます。", "images": ["img_honbu/honbu_071.jpg"]}, {"text": "マッチングは、お客様のアカウント設定の優先度1〜優先度3に設定されたお客様に対して、順番に公開されます。", "images": ["img_honbu/honbu_072.jpg"]}], "text": "依頼車両の進行状況を確認するには、画面上部メニュー [車両] を押下して車両画面を表示します。\n各STEPは、車両画面の、チャットメッセージで進行されますので、進行状況についてはこちらをご確認ください。\n車両の進行状況によって、画面上部のタブで絞り込みを行うことができます。\nすべて ： すべての車両が表示されます\n要対応 ： お客様が対応が必要な車両が表示されます\n未発注 ： 未発注の車両が表示されます\n進行中 ： 発注後、進行中の車両が表示されます\n納品済み ： 納品が完了した車両が表示されます\n進行状況によって、お客様にご対応いただくSTEPの詳細はそれぞれ以下のとおりになります。\n■ STEP1. 見積りを登録する\n[こちらのお見積り登録方法] を参考に、お見積りを登録いただきます。\n■ STEP3. 施工店 指名依頼 / 自動マッチング\n施工店を指名依頼するか、自動マッチングさせるかを選択します。\n■ 施工店を選択する\n施工店を選択する場合、施工店選択画面が表示されますので、こちらの一覧から担当の施工店を選択します。\n■ 自動マッチングする\n[自動マッチングする] ボタンを押下すると、マッチングが開始されます。\nマッチングは、お客様のアカウント設定の優先度1〜優先度3に設定されたお客様に対して、順番に公開されます。", "images": ["img_honbu/honbu_066.jpg", "img_honbu/honbu_067.jpg", "img_honbu/honbu_068.jpg", "img_honbu/honbu_069.jpg", "img_honbu/honbu_070.jpg", "img_honbu/honbu_071.jpg", "img_honbu/honbu_072.jpg"]}, {"heading": "🔻\n　　　　　　　　　　　　　　　　　　　　　🔻\n\n■ マッチング待機時間設定画面", "blocks": [{"text": "施工店がマッチングすると、マッチングの通知が表示されます。", "images": ["img_honbu/honbu_073.jpg"]}, {"text": "■ STEP5. 正式発注する", "images": []}, {"text": "お客様が正式発注されると、発注書が発行されます。", "images": ["img_honbu/honbu_074.jpg"]}], "text": "施工店がマッチングすると、マッチングの通知が表示されます。\n■ STEP5. 正式発注する\nお客様が正式発注されると、発注書が発行されます。", "images": ["img_honbu/honbu_073.jpg", "img_honbu/honbu_074.jpg"]}, {"heading": "依頼された内容を確認する", "blocks": [{"text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。", "images": ["img_honbu/honbu_075.jpg"]}, {"text": "車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、", "images": []}, {"text": "その画面上で、依頼内容をご確認いただくことができます。", "images": ["img_honbu/honbu_076.jpg"]}], "text": "依頼内容を確認するには、画面上部メニュー [車両] を押下して、車両画面を表示します。\n車両画面の左から対象の車を選択すると、右画面に [見積 / 車両情報] が表示されますので、\nその画面上で、依頼内容をご確認いただくことができます。", "images": ["img_honbu/honbu_075.jpg", "img_honbu/honbu_076.jpg"]}, {"heading": "依頼された車両に関する問い合わせをする", "blocks": [{"text": "依頼した車両に関するお問い合わせをされる場合は、画面上部メニュー [車両] を選択します。", "images": ["img_honbu/honbu_077.jpg"]}, {"text": "車両画面の左から対象の車を選択すると、右画面に [メッセージ] タブが表示されますので、そちらの画面から、該当の車両の修理に関するお問い合わせ内容を送信いただけます。", "images": ["img_honbu/honbu_078.jpg"]}, {"text": "メッセージ欄にメッセージを入力後、右の青いボタンを押下するとメッセージが送信されます。", "images": ["img_honbu/honbu_079.jpg"]}, {"text": "写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_honbu/honbu_080.jpg"]}], "text": "依頼した車両に関するお問い合わせをされる場合は、画面上部メニュー [車両] を選択します。\n車両画面の左から対象の車を選択すると、右画面に [メッセージ] タブが表示されますので、そちらの画面から、該当の車両の修理に関するお問い合わせ内容を送信いただけます。\nメッセージ欄にメッセージを入力後、右の青いボタンを押下するとメッセージが送信されます。\n写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_honbu/honbu_077.jpg", "img_honbu/honbu_078.jpg", "img_honbu/honbu_079.jpg", "img_honbu/honbu_080.jpg"]}, {"heading": "損傷箇所以外で、メッセージを送りたい", "blocks": [{"text": "見積り後の車両に関するやり取りは、車両一覧から行いますが、それ以外でのメッセージのやりとりは、画面上部の [メッセージ] メニューからメッセージを送信いただけます。", "images": ["img_honbu/honbu_081.jpg"]}, {"text": "画面を表示すると、左側に管理者や担当施工店名が表示されていますので、左から担当者を選択します。", "images": ["img_honbu/honbu_082.jpg"]}, {"text": "担当者を選択すると、チャット画面が表示されるので、テキストを入力します。", "images": ["img_honbu/honbu_083.jpg"]}, {"text": "右の青いボタンを押下するとメッセージが送信されます。", "images": ["img_honbu/honbu_084.jpg"]}, {"text": "写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_honbu/honbu_085.jpg"]}], "text": "見積り後の車両に関するやり取りは、車両一覧から行いますが、それ以外でのメッセージのやりとりは、画面上部の [メッセージ] メニューからメッセージを送信いただけます。\n画面を表示すると、左側に管理者や担当施工店名が表示されていますので、左から担当者を選択します。\n担当者を選択すると、チャット画面が表示されるので、テキストを入力します。\n右の青いボタンを押下するとメッセージが送信されます。\n写真を送りたい場合は、カメラマークから写真を添付します。", "images": ["img_honbu/honbu_081.jpg", "img_honbu/honbu_082.jpg", "img_honbu/honbu_083.jpg", "img_honbu/honbu_084.jpg", "img_honbu/honbu_085.jpg"]}, {"heading": "加修依頼をキャンセルする", "blocks": [{"text": "加修依頼をキャンセルされる場合は、画面上部メニュー [車両] を押下して、車両画面を表示し、", "images": ["img_honbu/honbu_086.jpg"]}, {"text": "画面上部のボタン [案件キャンセル] を押下します。", "images": ["img_honbu/honbu_087.jpg"]}, {"text": "案件キャンセル画面が表示されますので、対象の車両を選択します。", "images": ["img_honbu/honbu_088.jpg"]}, {"text": "選択すると、対象車両に関する情報が表示されますので、[キャンセル申請を送る] ボタンを押下します", "images": ["img_honbu/honbu_089.jpg"]}, {"text": "案件キャンセル理由を入力する画面が表示されますので、キャンセル理由を入力し、[キャンセルする] ボタンを押下します。", "images": ["img_honbu/honbu_090.jpg"]}, {"text": "キャンセルが完了した旨ポップアップが表示されます。", "images": ["img_honbu/honbu_091.jpg"]}, {"text": "メッセージ上に、案件をキャンセルのメッセージが表示され、案件キャンセルが成立となります。", "images": ["img_honbu/honbu_092.jpg"]}], "text": "加修依頼をキャンセルされる場合は、画面上部メニュー [車両] を押下して、車両画面を表示し、\n画面上部のボタン [案件キャンセル] を押下します。\n案件キャンセル画面が表示されますので、対象の車両を選択します。\n選択すると、対象車両に関する情報が表示されますので、[キャンセル申請を送る] ボタンを押下します\n案件キャンセル理由を入力する画面が表示されますので、キャンセル理由を入力し、[キャンセルする] ボタンを押下します。\nキャンセルが完了した旨ポップアップが表示されます。\nメッセージ上に、案件をキャンセルのメッセージが表示され、案件キャンセルが成立となります。", "images": ["img_honbu/honbu_086.jpg", "img_honbu/honbu_087.jpg", "img_honbu/honbu_088.jpg", "img_honbu/honbu_089.jpg", "img_honbu/honbu_090.jpg", "img_honbu/honbu_091.jpg", "img_honbu/honbu_092.jpg"]}, {"heading": "訪問予約をする", "blocks": [{"text": "お客様に訪問を予定する場合、[スケジュール] メニューを表示して、お客様のスケジュールを表示します。", "images": ["img_honbu/honbu_093.jpg"]}, {"text": "左のお客様タブにお客様一覧が表示されますので、対象のお客様を選択します。", "images": ["img_honbu/honbu_094.jpg"]}, {"text": "お客様を選択すると、お客様のカレンダーが表示されます。", "images": ["img_honbu/honbu_095.jpg"]}], "text": "お客様に訪問を予定する場合、[スケジュール] メニューを表示して、お客様のスケジュールを表示します。\n左のお客様タブにお客様一覧が表示されますので、対象のお客様を選択します。\nお客様を選択すると、お客様のカレンダーが表示されます。", "images": ["img_honbu/honbu_093.jpg", "img_honbu/honbu_094.jpg", "img_honbu/honbu_095.jpg"]}, {"heading": "施工店をアサインする", "blocks": [{"text": "ポップアップが表示されますので、[+ 訪問予約追加（施工店）] を押下します。", "images": ["img_honbu/honbu_096.jpg"]}, {"text": "訪問予約画面が表示されるので、左カラムから施工店を選択します。", "images": []}, {"text": "複数選択することで、施工店のスケジュールを比較することができます。", "images": ["img_honbu/honbu_097.jpg"]}, {"text": "施工店を選択すると、中央カラムに、施工店の空きスケジュールが表示されます。", "images": ["img_honbu/honbu_098.jpg"]}, {"text": "■ 空きスケジュールに訪問予約する", "images": []}, {"text": "空きスケジュールは、◯がついているので、◯が付いている空きスケジュールを押下すると、どの施工店に訪問していただくを選択する画面が表示されます。", "images": ["img_honbu/honbu_099.jpg"]}, {"text": "施工店を選択すると、訪問先などの確認画面が表示されますので、[訪問予約を登録する] を押下します。", "images": ["img_honbu/honbu_100.jpg"]}, {"text": "訪問予約が完了したら、完了メッセージが表示されます。", "images": ["img_honbu/honbu_101.jpg"]}, {"text": "■ 予定があるスケジュールに訪問予約する", "images": []}, {"text": "先方の予定があるスケジュールは、✕がついていますが、施工店と会話して訪問予約していただくケースもありますの訪問予約することができます。", "images": []}, {"text": "スケジュールを押下すると、どの施工店に訪問していただくを選択する画面が表示されます。", "images": ["img_honbu/honbu_102.jpg"]}, {"text": "施工店を選択すると、本当に良いかを確認するポップアップが表示されますので、[了承して選択する] を押下します。", "images": ["img_honbu/honbu_103.jpg"]}, {"text": "訪問先などの確認画面が表示されますので、[訪問予約を登録する] を押下します。", "images": ["img_honbu/honbu_104.jpg"]}, {"text": "訪問予約が完了したら、完了メッセージが表示されます。", "images": ["img_honbu/honbu_105.jpg"]}, {"text": "■ 常駐登録する場合", "images": []}, {"text": "訪問予約確認画面に、常駐を設定するボタンがありますので、そこから定期的な訪問設定を行うことが可能です。", "images": []}, {"text": "常駐は最長１か月の設定になります。", "images": ["img_honbu/honbu_106.jpg", "img_honbu/honbu_107.jpg"]}], "text": "ポップアップが表示されますので、[+ 訪問予約追加（施工店）] を押下します。\n訪問予約画面が表示されるので、左カラムから施工店を選択します。\n複数選択することで、施工店のスケジュールを比較することができます。\n施工店を選択すると、中央カラムに、施工店の空きスケジュールが表示されます。\n■ 空きスケジュールに訪問予約する\n空きスケジュールは、◯がついているので、◯が付いている空きスケジュールを押下すると、どの施工店に訪問していただくを選択する画面が表示されます。\n施工店を選択すると、訪問先などの確認画面が表示されますので、[訪問予約を登録する] を押下します。\n訪問予約が完了したら、完了メッセージが表示されます。\n■ 予定があるスケジュールに訪問予約する\n先方の予定があるスケジュールは、✕がついていますが、施工店と会話して訪問予約していただくケースもありますの訪問予約することができます。\nスケジュールを押下すると、どの施工店に訪問していただくを選択する画面が表示されます。\n施工店を選択すると、本当に良いかを確認するポップアップが表示されますので、[了承して選択する] を押下します。\n訪問先などの確認画面が表示されますので、[訪問予約を登録する] を押下します。\n訪問予約が完了したら、完了メッセージが表示されます。\n■ 常駐登録する場合\n訪問予約確認画面に、常駐を設定するボタンがありますので、そこから定期的な訪問設定を行うことが可能です。\n常駐は最長１か月の設定になります。", "images": ["img_honbu/honbu_096.jpg", "img_honbu/honbu_097.jpg", "img_honbu/honbu_098.jpg", "img_honbu/honbu_099.jpg", "img_honbu/honbu_100.jpg", "img_honbu/honbu_101.jpg", "img_honbu/honbu_102.jpg", "img_honbu/honbu_103.jpg", "img_honbu/honbu_104.jpg", "img_honbu/honbu_105.jpg", "img_honbu/honbu_106.jpg", "img_honbu/honbu_107.jpg"]}, {"heading": "本部をアサインする", "blocks": [{"text": "ポップアップが表示されますので、[+ 訪問予約追加（本部）] を押下します。", "images": ["img_honbu/honbu_108.jpg"]}, {"text": "本部向けの訪問予約画面が表示されますので、まず、[担当者を選択] ボタンを押下して担当者を選択して、決定します。", "images": ["img_honbu/honbu_109.jpg", "img_honbu/honbu_110.jpg"]}, {"text": "[訪問予約を登録する] ボタンを押下して、訪問予約を完了します。", "images": []}, {"text": "完了したら、以下のポップアップが表示されます。", "images": ["img_honbu/honbu_111.jpg"]}, {"text": "メッセージ画面に、以下のシステムメッセージが表示され、本部宛てにメール通知が行われます。", "images": ["img_honbu/honbu_112.jpg"]}, {"text": "■ 常駐登録する場合", "images": []}, {"text": "訪問予約確認画面に、常駐を設定するボタンがありますので、そこから定期的な訪問設定を行うことが可能です。", "images": []}, {"text": "常駐は最長１か月の設定になります。", "images": ["img_honbu/honbu_113.jpg", "img_honbu/honbu_114.jpg"]}], "text": "ポップアップが表示されますので、[+ 訪問予約追加（本部）] を押下します。\n本部向けの訪問予約画面が表示されますので、まず、[担当者を選択] ボタンを押下して担当者を選択して、決定します。\n[訪問予約を登録する] ボタンを押下して、訪問予約を完了します。\n完了したら、以下のポップアップが表示されます。\nメッセージ画面に、以下のシステムメッセージが表示され、本部宛てにメール通知が行われます。\n■ 常駐登録する場合\n訪問予約確認画面に、常駐を設定するボタンがありますので、そこから定期的な訪問設定を行うことが可能です。\n常駐は最長１か月の設定になります。", "images": ["img_honbu/honbu_108.jpg", "img_honbu/honbu_109.jpg", "img_honbu/honbu_110.jpg", "img_honbu/honbu_111.jpg", "img_honbu/honbu_112.jpg", "img_honbu/honbu_113.jpg", "img_honbu/honbu_114.jpg"]}, {"heading": "お客様のスケジュールを登録・更新する", "blocks": [{"text": "お客様のスケジュールを登録するには、上部メニュー [スケジュール] を押下します。", "images": ["img_honbu/honbu_115.jpg"]}, {"text": "左カラムの「お客様」のタブを選択して、対象のお客様を選択すると、中央にお客様のカレンダーが表示されます。", "images": ["img_honbu/honbu_116.jpg"]}, {"text": "該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。", "images": ["img_honbu/honbu_117.jpg"]}, {"text": "予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。", "images": ["img_honbu/honbu_118.jpg"]}, {"text": "予定の登録が完了し、スケジュールに新規予定が表示されます。", "images": ["img_honbu/honbu_119.jpg"]}, {"text": "終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。", "images": ["img_honbu/honbu_120.jpg"]}, {"text": "終日の予定は、日付がグレー表示されます。", "images": ["img_honbu/honbu_121.jpg"]}], "text": "お客様のスケジュールを登録するには、上部メニュー [スケジュール] を押下します。\n左カラムの「お客様」のタブを選択して、対象のお客様を選択すると、中央にお客様のカレンダーが表示されます。\n該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。\n予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。\n予定の登録が完了し、スケジュールに新規予定が表示されます。\n終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。\n終日の予定は、日付がグレー表示されます。", "images": ["img_honbu/honbu_115.jpg", "img_honbu/honbu_116.jpg", "img_honbu/honbu_117.jpg", "img_honbu/honbu_118.jpg", "img_honbu/honbu_119.jpg", "img_honbu/honbu_120.jpg", "img_honbu/honbu_121.jpg"]}, {"heading": "施工店のスケジュールを登録・更新する", "blocks": [{"text": "施工店のスケジュールを登録するには、上部メニュー [スケジュール] を押下します。", "images": ["img_honbu/honbu_122.jpg"]}, {"text": "左カラムの「施工店」のタブを選択して、対象の施工店を選択すると、中央に施工店のカレンダーが表示されます。", "images": ["img_honbu/honbu_123.jpg"]}, {"text": "該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。", "images": ["img_honbu/honbu_124.jpg"]}, {"text": "予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。", "images": ["img_honbu/honbu_125.jpg"]}, {"text": "予定の登録が完了し、スケジュールに新規予定が表示されます。", "images": ["img_honbu/honbu_126.jpg"]}, {"text": "終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。", "images": ["img_honbu/honbu_127.jpg"]}, {"text": "終日の予定は、日付がグレー表示されます。", "images": ["img_honbu/honbu_128.jpg"]}], "text": "施工店のスケジュールを登録するには、上部メニュー [スケジュール] を押下します。\n左カラムの「施工店」のタブを選択して、対象の施工店を選択すると、中央に施工店のカレンダーが表示されます。\n該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。\n予定のタイトルと、日時を指定して、ボタン [保存する] を押下します。\n予定の登録が完了し、スケジュールに新規予定が表示されます。\n終日予定がある場合は、赤枠のトグルをONにすると、終日の予定として登録されます。\n終日の予定は、日付がグレー表示されます。", "images": ["img_honbu/honbu_122.jpg", "img_honbu/honbu_123.jpg", "img_honbu/honbu_124.jpg", "img_honbu/honbu_125.jpg", "img_honbu/honbu_126.jpg", "img_honbu/honbu_127.jpg", "img_honbu/honbu_128.jpg"]}, {"heading": "トータルリペア本部の休業日を登録・更新する", "blocks": [{"text": "トータルリペア本部のスケジュールは、休業日のみ登録することができます。", "images": []}, {"text": "登録するには、上部メニュー [スケジュール] を押下します。", "images": ["img_honbu/honbu_129.jpg"]}, {"text": "画面上部の [本部予定] ボタンを押下すると、中央にトータルリペア本部のカレンダーが表示されます。", "images": ["img_honbu/honbu_130.jpg"]}, {"text": "該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。", "images": ["img_honbu/honbu_131.jpg"]}, {"text": "予定のタイトルを入力して、ボタン [保存する] を押下します。", "images": ["img_honbu/honbu_132.jpg"]}, {"text": "予定の登録が完了し、スケジュールに新規予定が表示されます。", "images": ["img_honbu/honbu_133.jpg"]}, {"text": "休業日は、日付がグレー表示されます。", "images": ["img_honbu/honbu_134.jpg"]}], "text": "トータルリペア本部のスケジュールは、休業日のみ登録することができます。\n登録するには、上部メニュー [スケジュール] を押下します。\n画面上部の [本部予定] ボタンを押下すると、中央にトータルリペア本部のカレンダーが表示されます。\n該当の日付を押下すると、ポップアップが表示されるので、ボタン [+予定を追加] を押下します。\n予定のタイトルを入力して、ボタン [保存する] を押下します。\n予定の登録が完了し、スケジュールに新規予定が表示されます。\n休業日は、日付がグレー表示されます。", "images": ["img_honbu/honbu_129.jpg", "img_honbu/honbu_130.jpg", "img_honbu/honbu_131.jpg", "img_honbu/honbu_132.jpg", "img_honbu/honbu_133.jpg", "img_honbu/honbu_134.jpg"]}, {"heading": "お客様に請求する", "blocks": [{"text": "お客様への請求は、[管理メニュー] から、[請求・支払い管理] を選択します。", "images": ["img_honbu/honbu_135.jpg"]}, {"text": "請求画面で、タブ請求締めを選択します。", "images": ["img_honbu/honbu_136.jpg"]}, {"text": "請求される対象の月と、必要があれば、請求先として本社を指定します。", "images": ["img_honbu/honbu_137.jpg"]}, {"text": "請求一覧を右にスクロールすると、請求対象を承認フローを開始します。", "images": []}], "text": "お客様への請求は、[管理メニュー] から、[請求・支払い管理] を選択します。\n請求画面で、タブ請求締めを選択します。\n請求される対象の月と、必要があれば、請求先として本社を指定します。\n請求一覧を右にスクロールすると、請求対象を承認フローを開始します。", "images": ["img_honbu/honbu_135.jpg", "img_honbu/honbu_136.jpg", "img_honbu/honbu_137.jpg"]}, {"heading": "承認フロー ①申請", "blocks": [{"text": "まず、請求ロールが「一般」のユーザーが、請求内容を確認して、問題がなければ [①申請] ボタンを押下します。", "images": ["img_honbu/honbu_138.jpg"]}, {"text": "ボタンを押下すると、確認を求めるポップアップが表示されるので、[申請する] ボタンを押下します。", "images": ["img_honbu/honbu_139.jpg"]}], "text": "まず、請求ロールが「一般」のユーザーが、請求内容を確認して、問題がなければ [①申請] ボタンを押下します。\nボタンを押下すると、確認を求めるポップアップが表示されるので、[申請する] ボタンを押下します。", "images": ["img_honbu/honbu_138.jpg", "img_honbu/honbu_139.jpg"]}, {"heading": "承認フロー ②承認", "blocks": [{"text": "次に、請求ロールが「管理者」のユーザーが、申請内容を確認して、問題がなければ [②承認] ボタンを押下します。", "images": ["img_honbu/honbu_140.jpg"]}, {"text": "ボタンを押下すると、確認を求めるポップアップが表示されるので、[承認する] ボタンを押下します。", "images": ["img_honbu/honbu_141.jpg"]}], "text": "次に、請求ロールが「管理者」のユーザーが、申請内容を確認して、問題がなければ [②承認] ボタンを押下します。\nボタンを押下すると、確認を求めるポップアップが表示されるので、[承認する] ボタンを押下します。", "images": ["img_honbu/honbu_140.jpg", "img_honbu/honbu_141.jpg"]}, {"heading": "承認フロー ③請求書発行", "blocks": [{"text": "次に、請求ロールが「一般」または「管理者」のユーザーが、問題がなければ [③請求書発行] ボタンを押下します。", "images": []}], "text": "次に、請求ロールが「一般」または「管理者」のユーザーが、問題がなければ [③請求書発行] ボタンを押下します。", "images": []}, {"heading": "⚠️送付方法による請求書送付の違い\n\n送付方法がメール\n送付方法がメールの場合は、 [③請求書発行] ボタンが押下されたら、お客様に対して、請求書がメールで送付されます。\n\n送付方法が郵送\n送付方法が郵送の場合は、 [③請求書発行] ボタンが押下されたら、請求書をダウンロードできますので、お客様に請求書を郵送します。", "blocks": [{"text": "", "images": ["img_honbu/honbu_142.jpg"]}, {"text": "ボタンを押下すると、確認を求めるポップアップが表示されるので、[発行する] ボタンを押下します。", "images": ["img_honbu/honbu_143.jpg"]}], "text": "ボタンを押下すると、確認を求めるポップアップが表示されるので、[発行する] ボタンを押下します。", "images": ["img_honbu/honbu_142.jpg", "img_honbu/honbu_143.jpg"]}, {"heading": "承認フロー ④郵送完了", "blocks": [{"text": "次に、お客様への郵送が完了したあと、請求ロールが「一般」または「管理者」のユーザーが、 [④郵送完了] ボタンを押下します。", "images": ["img_honbu/honbu_144.jpg"]}], "text": "次に、お客様への郵送が完了したあと、請求ロールが「一般」または「管理者」のユーザーが、 [④郵送完了] ボタンを押下します。", "images": ["img_honbu/honbu_144.jpg"]}, {"heading": "請求書に申し送り事項を追加したい", "blocks": [{"text": "請求書に申し送り事項を表示させたい場合、各請求ごとに表示されている備考欄に入力します。", "images": ["img_honbu/honbu_145.jpg"]}, {"text": "備考欄に追加して [備考を更新] を押下します。", "images": ["img_honbu/honbu_146.jpg"]}, {"text": "請求書の備考欄に、備考欄で入力された内容が表記されています。", "images": ["img_honbu/honbu_147.jpg"]}], "text": "請求書に申し送り事項を表示させたい場合、各請求ごとに表示されている備考欄に入力します。\n備考欄に追加して [備考を更新] を押下します。\n請求書の備考欄に、備考欄で入力された内容が表記されています。", "images": ["img_honbu/honbu_145.jpg", "img_honbu/honbu_146.jpg", "img_honbu/honbu_147.jpg"]}, {"heading": "請求時に、該当案件を次回請求に回す", "blocks": [{"text": "案件のタイミングによって、次回の請求に回したい場合は、案件ごとのアクションエリアにあるボタン [繰越] を押下します。", "images": ["img_honbu/honbu_148.jpg"]}, {"text": "押下すると、翌月の請求情報がまだ存在しない場合は、「新しい請求を作成する」が選択肢として表示されますので、[移動する] ボタンを押下して、案件を移動させます。", "images": ["img_honbu/honbu_149.jpg"]}, {"text": "既に案件が存在する場合は、移動先の請求を選択して、[移動する] ボタンを押下します。", "images": ["img_honbu/honbu_150.jpg"]}], "text": "案件のタイミングによって、次回の請求に回したい場合は、案件ごとのアクションエリアにあるボタン [繰越] を押下します。\n押下すると、翌月の請求情報がまだ存在しない場合は、「新しい請求を作成する」が選択肢として表示されますので、[移動する] ボタンを押下して、案件を移動させます。\n既に案件が存在する場合は、移動先の請求を選択して、[移動する] ボタンを押下します。", "images": ["img_honbu/honbu_148.jpg", "img_honbu/honbu_149.jpg", "img_honbu/honbu_150.jpg"]}, {"heading": "請求時に、該当案件を次回請求に回す", "blocks": [{"text": "案件のタイミングによっては、次月の請求が作成されている場合、案件を前月請求に回したい場合は、案件ごとのアクションエリアにあるボタン [見越] を押下します。", "images": ["img_honbu/honbu_151.jpg"]}, {"text": "案件が存在する場合は、移動先の請求を選択して、[移動する] ボタンを押下します。", "images": ["img_honbu/honbu_152.jpg"]}], "text": "案件のタイミングによっては、次月の請求が作成されている場合、案件を前月請求に回したい場合は、案件ごとのアクションエリアにあるボタン [見越] を押下します。\n案件が存在する場合は、移動先の請求を選択して、[移動する] ボタンを押下します。", "images": ["img_honbu/honbu_151.jpg", "img_honbu/honbu_152.jpg"]}, {"heading": "請求済みの請求に誤りが見つかった場合", "blocks": [{"text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}], "text": "（この操作の詳しい手順は、操作を行う担当ロールのマニュアルに記載されています。本部・管理者にご確認ください。）", "images": []}, {"heading": "次回請求までに誤りが見つかった", "blocks": [{"text": "請求済みの場合でも、次の請求までは、システム上から締め直すことができます。", "images": []}, {"text": "締め直すには、[締め直し] ボタンを押下します。", "images": ["img_honbu/honbu_153.jpg"]}, {"text": "締め直しボタンを押下すると、元の請求を取消する。", "images": ["img_honbu/honbu_154.jpg"]}, {"text": "締め直しを行うと、送信済みの請求書は無効状態になり、元の請求を複製した請求データが作成されます。", "images": ["img_honbu/honbu_155.jpg"]}, {"text": "請求書の請求書番号は枝番が付与されたデータが生成されます。", "images": ["img_honbu/honbu_156.jpg"]}], "text": "請求済みの場合でも、次の請求までは、システム上から締め直すことができます。\n締め直すには、[締め直し] ボタンを押下します。\n締め直しボタンを押下すると、元の請求を取消する。\n締め直しを行うと、送信済みの請求書は無効状態になり、元の請求を複製した請求データが作成されます。\n請求書の請求書番号は枝番が付与されたデータが生成されます。", "images": ["img_honbu/honbu_153.jpg", "img_honbu/honbu_154.jpg", "img_honbu/honbu_155.jpg", "img_honbu/honbu_156.jpg"]}, {"heading": "次月の請求が既に請求済みの場合", "blocks": [{"text": "請求済みの場合、次月の請求が既に請求済みの場合は、締め直しを行うことができません。", "images": []}, {"text": "締め直しボタンは非表示になります。", "images": ["img_honbu/honbu_157.jpg"]}, {"text": "■ 対象の施工店の当月の請求が存在しない場合", "images": []}, {"text": "その場合、画面下部にある [+ 請求を新規作成] ボタンを押下して、個別請求を立てます。", "images": ["img_honbu/honbu_158.jpg"]}, {"text": "対象のお客様を選択する画面が表示されますので、対象のお客様を選択します。", "images": ["img_honbu/honbu_159.jpg"]}, {"text": "[請求を作成] ボタンを押下することで、新規で請求を作成します。", "images": ["img_honbu/honbu_160.jpg"]}, {"text": "請求を新規作成すると、空の請求が作成されます。", "images": ["img_honbu/honbu_161.jpg"]}, {"text": "この後の処理は [対象の施工店の当月の請求が存在する場合] を参照ください。", "images": []}, {"text": "■ 対象の施工店の当月の請求が存在する場合", "images": []}, {"text": "当月の請求が既に存在する場合は、対象の請求を表示してから [+ 自由明細を追加] を押下します。", "images": ["img_honbu/honbu_162.jpg"]}, {"text": "自由明細追加画面が表示されるので、明細内容と、金額を追加して、[自由明細を追加] を押下します。", "images": ["img_honbu/honbu_163.jpg"]}, {"text": "明細タイプが自由明細の行が追加されます。", "images": ["img_honbu/honbu_164.jpg"]}, {"text": "請求書にも、自由明細の行が追加されます。", "images": ["img_honbu/honbu_165.jpg"]}], "text": "請求済みの場合、次月の請求が既に請求済みの場合は、締め直しを行うことができません。\n締め直しボタンは非表示になります。\n■ 対象の施工店の当月の請求が存在しない場合\nその場合、画面下部にある [+ 請求を新規作成] ボタンを押下して、個別請求を立てます。\n対象のお客様を選択する画面が表示されますので、対象のお客様を選択します。\n[請求を作成] ボタンを押下することで、新規で請求を作成します。\n請求を新規作成すると、空の請求が作成されます。\nこの後の処理は [対象の施工店の当月の請求が存在する場合] を参照ください。\n■ 対象の施工店の当月の請求が存在する場合\n当月の請求が既に存在する場合は、対象の請求を表示してから [+ 自由明細を追加] を押下します。\n自由明細追加画面が表示されるので、明細内容と、金額を追加して、[自由明細を追加] を押下します。\n明細タイプが自由明細の行が追加されます。\n請求書にも、自由明細の行が追加されます。", "images": ["img_honbu/honbu_157.jpg", "img_honbu/honbu_158.jpg", "img_honbu/honbu_159.jpg", "img_honbu/honbu_160.jpg", "img_honbu/honbu_161.jpg", "img_honbu/honbu_162.jpg", "img_honbu/honbu_163.jpg", "img_honbu/honbu_164.jpg", "img_honbu/honbu_165.jpg"]}, {"heading": "施工店へ支払いを確定する", "blocks": [{"text": "施工店への支払い確定は、[管理メニュー] から、[請求・支払い管理] を選択します。", "images": ["img_honbu/honbu_166.jpg"]}, {"text": "請求画面で、タブ 月次締めを選択します。", "images": ["img_honbu/honbu_167.jpg"]}, {"text": "請求される対象の月と、必要があれば、請求先として本社を指定します。", "images": ["img_honbu/honbu_168.jpg"]}], "text": "施工店への支払い確定は、[管理メニュー] から、[請求・支払い管理] を選択します。\n請求画面で、タブ 月次締めを選択します。\n請求される対象の月と、必要があれば、請求先として本社を指定します。", "images": ["img_honbu/honbu_166.jpg", "img_honbu/honbu_167.jpg", "img_honbu/honbu_168.jpg"]}, {"heading": "施工店ごとに支払いを確定する", "blocks": [{"text": "月次支払い一覧を右にスクロールすると、支払いごとに [内部確定] ボタンが存在するので、", "images": ["img_honbu/honbu_169.jpg"]}, {"text": "内部確定を押下すると、以下のポップアップが表示されますので、[確定する] を押下します。", "images": ["img_honbu/honbu_170.jpg"]}, {"text": "確定が完了すると、内部確定日時が表示され、内部確定ボタンが [確定取消] に表示変更されます。", "images": ["img_honbu/honbu_171.jpg"]}, {"text": "確定を取り消すことも可能ですが、一度支払い通知書は送付されていますので、再度施工店に通知がされることになります。", "images": []}], "text": "月次支払い一覧を右にスクロールすると、支払いごとに [内部確定] ボタンが存在するので、\n内部確定を押下すると、以下のポップアップが表示されますので、[確定する] を押下します。\n確定が完了すると、内部確定日時が表示され、内部確定ボタンが [確定取消] に表示変更されます。\n確定を取り消すことも可能ですが、一度支払い通知書は送付されていますので、再度施工店に通知がされることになります。", "images": ["img_honbu/honbu_169.jpg", "img_honbu/honbu_170.jpg", "img_honbu/honbu_171.jpg"]}, {"heading": "施工店を一括で支払い確定する", "blocks": [{"text": "施工店への支払いを一括で確定して通知することができます。", "images": []}, {"text": "一括で確定・通知する場合は、画面上部にある [内部確定] を押下します。", "images": ["img_honbu/honbu_172.jpg"]}, {"text": "[内部確定] を押下すると、以下のポップアップが表示されるため、[確定する] を押下します。", "images": ["img_honbu/honbu_173.jpg"]}, {"text": "確定が完了すると、内部確定日時が表示され、内部確定ボタンが [確定取消] に表示変更されます。", "images": ["img_honbu/honbu_174.jpg"]}], "text": "施工店への支払いを一括で確定して通知することができます。\n一括で確定・通知する場合は、画面上部にある [内部確定] を押下します。\n[内部確定] を押下すると、以下のポップアップが表示されるため、[確定する] を押下します。\n確定が完了すると、内部確定日時が表示され、内部確定ボタンが [確定取消] に表示変更されます。", "images": ["img_honbu/honbu_172.jpg", "img_honbu/honbu_173.jpg", "img_honbu/honbu_174.jpg"]}, {"heading": "FBデータを出力する", "blocks": [{"text": "銀行振り込み用FBデータは、月次締めの [FBデータ出力] ボタンを押下します。", "images": ["img_honbu/honbu_175.jpg"]}, {"text": "ポップアップが表示されるので、[出力する] を押下すると、CSV形式でFBデータを出力することができます。", "images": ["img_honbu/honbu_176.jpg"]}], "text": "銀行振り込み用FBデータは、月次締めの [FBデータ出力] ボタンを押下します。\nポップアップが表示されるので、[出力する] を押下すると、CSV形式でFBデータを出力することができます。", "images": ["img_honbu/honbu_175.jpg", "img_honbu/honbu_176.jpg"]}, {"heading": "お客様情報を新規で登録する", "blocks": [{"text": "画面上部にある [管理メニュー] から アカウント ->「新規アカウント発行」を押下して、新規アカウント発行画面を表示します。", "images": []}, {"text": "アカウント種別から、お客様を選択します。", "images": ["img_honbu/honbu_177.jpg"]}], "text": "画面上部にある [管理メニュー] から アカウント ->「新規アカウント発行」を押下して、新規アカウント発行画面を表示します。\nアカウント種別から、お客様を選択します。", "images": ["img_honbu/honbu_177.jpg"]}, {"heading": "法人情報設定", "blocks": [{"text": "まず法人情報を指定します。", "images": []}, {"text": "法人情報が存在しない場合は、スキップします。", "images": ["img_honbu/honbu_178.jpg"]}, {"text": "必須情報を入力した上で [次へ] ボタンを押下します。", "images": ["img_honbu/honbu_179.jpg"]}], "text": "まず法人情報を指定します。\n法人情報が存在しない場合は、スキップします。\n必須情報を入力した上で [次へ] ボタンを押下します。", "images": ["img_honbu/honbu_178.jpg", "img_honbu/honbu_179.jpg"]}, {"heading": "店舗情報設定", "blocks": [{"text": "店舗情報を入力して [次へ] を押下します。", "images": ["img_honbu/honbu_180.jpg"]}], "text": "店舗情報を入力して [次へ] を押下します。", "images": ["img_honbu/honbu_180.jpg"]}, {"heading": "アカウント設定", "blocks": [{"text": "アカウント設定を行います。", "images": ["img_honbu/honbu_181.jpg"]}, {"text": "主担当 ： ■ 本部開拓\n本部で開拓したお客様の場合、指定します\n\n■施工店自己開拓\n施工店が開拓したお客様の場合、指定します", "images": []}, {"text": "管理ユーザーによる社内承認 ： お客様の中で社内承認を実施されたいかを指定します。", "images": []}, {"text": "請求書の送付先 ： 請求書の送付先を指定します。", "images": []}, {"text": "請求書の送付方法 ： ■メール\n請求書を自動で送付する場合、指定します\n\n■郵送\n請求書を郵送で送付する場合、指定します", "images": []}, {"text": "トータルリペア本部口座の利用 ： ※ 主担当が施工店自己開拓の場合に有効化　\n\nトータルリペア本部口座を利用するかどうかを指定します", "images": []}, {"text": "次にマッチング設定を行います。", "images": []}], "text": "アカウント設定を行います。\n主担当 ： ■ 本部開拓\n本部で開拓したお客様の場合、指定します\n\n■施工店自己開拓\n施工店が開拓したお客様の場合、指定します\n管理ユーザーによる社内承認 ： お客様の中で社内承認を実施されたいかを指定します。\n請求書の送付先 ： 請求書の送付先を指定します。\n請求書の送付方法 ： ■メール\n請求書を自動で送付する場合、指定します\n\n■郵送\n請求書を郵送で送付する場合、指定します\nトータルリペア本部口座の利用 ： ※ 主担当が施工店自己開拓の場合に有効化　\n\nトータルリペア本部口座を利用するかどうかを指定します\n次にマッチング設定を行います。", "images": ["img_honbu/honbu_181.jpg"]}, {"heading": "マッチング設定", "blocks": [{"text": "■ 主担当が本部のお客様の場合", "images": []}, {"text": "主担当を本部にした場合は以下の設定項目になります。", "images": ["img_honbu/honbu_182.jpg"]}, {"text": "マッチング要施工店 ： 優先度１〜３で、マッチング施工店を選択します。\n各優先度は、複数の施工店を選択できます。", "images": []}, {"text": "カスタムマッチング ： カスタムマッチングを実施するかどうかを指定します。\n\nカスタムマッチングがOFFの場合は、優先度１〜３がマッチング出来なかった場合、本部が手動で施工店選択となります。", "images": []}, {"text": "施工店ブロックリスト ： お客様のマッチング設定で、対象の施工店が選択やマッチングができないように指定します。", "images": []}, {"text": "施工店許容レベル ： お客様が許容される施工店レベルを指定します", "images": []}, {"text": "■ 主担当が施工店自己開拓のお客様の場合", "images": []}, {"text": "主担当を施工店自己開拓にした場合は、以下の設定項目になります。", "images": ["img_honbu/honbu_183.jpg"]}, {"text": "担当施工店 ： お客様を自己開拓された施工店を指定します。", "images": []}, {"text": "カスタムマッチング ： カスタムマッチングを実施するかどうかを指定します。", "images": []}, {"text": "施工店ブロックリスト ： お客様のマッチング設定で、対象の施工店が選択やマッチングができないように指定します。", "images":
